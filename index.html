<body>
  <div id="root">
    <div class="boot">

      <span>กำลังโหลดแอปพลิเคชัน...</span>

  <script type="text/babel" data-presets="react">
  /* eslint-disable */
  const { useState, useMemo, useEffect } = React;
  const {
    LineChart, Line, BarChart, Bar,
    XAxis, YAxis, CartesianGrid, Tooltip, Legend,
    ResponsiveContainer, ReferenceDot,
  } = Recharts;

  // ==========================================================================
  // CONSTANTS + TARIFF + REGIONS
  // ==========================================================================
  const DAYS_PER_MONTH = 30;                                           // for appliance kWh
  const DAYS_IN_MONTH  = [31,28,31,30,31,30,31,31,30,31,30,31];       // for solar generation
  const MONTHS_PER_YEAR= 12;
  const PROJECTION_YEARS = 10;

  // Monthly Peak Sun Hours (kWh/m²/day) by Thai region
  // Approximated from PVGIS-SARAH2 + DEDE (กรมพัฒนาพลังงานทดแทน) data
  const REGIONS = {
    central: {
      name: 'ภาคกลาง / กรุงเทพฯ',
      psh:  [4.8, 5.2, 5.5, 5.3, 4.8, 4.3, 4.0, 3.8, 3.9, 4.3, 4.7, 4.8],
    },
    north: {
      name: 'ภาคเหนือ / เชียงใหม่',
      psh:  [4.7, 5.3, 5.6, 5.5, 5.0, 4.4, 4.1, 4.0, 4.2, 4.5, 4.6, 4.5],
    },
    northeast: {
      name: 'ภาคอีสาน / ขอนแก่น',
      psh:  [5.0, 5.4, 5.7, 5.5, 5.0, 4.6, 4.4, 4.2, 4.3, 4.7, 4.9, 4.9],
    },
    east: {
      name: 'ภาคตะวันออก / ระยอง-ชลบุรี',
      psh:  [4.9, 5.3, 5.6, 5.4, 4.9, 4.5, 4.2, 4.1, 4.2, 4.5, 4.8, 4.9],
    },
    southGulf: {
      name: 'ภาคใต้ฝั่งอ่าวไทย / สงขลา',
      psh:  [4.3, 4.8, 5.2, 5.3, 5.0, 4.7, 4.5, 4.5, 4.4, 4.2, 3.9, 4.0],
    },
    southAndaman: {
      name: 'ภาคใต้ฝั่งอันดามัน / ภูเก็ต',
      psh:  [4.7, 5.0, 5.3, 5.4, 4.8, 4.5, 4.4, 4.3, 4.4, 4.5, 4.4, 4.5],
    },
  };

  const DEFAULT_REGION = 'central';
  const DEFAULT_PR     = 0.78;  // Performance Ratio (typical Thai rooftop)

  function avgPsh(region) {
    return REGIONS[region].psh.reduce((a, b) => a + b, 0) / 12;
  }

  // ---- Equipment defaults ----
  const DEFAULT_EQUIPMENT = {
    panels:   { watts: 550, count: 10, brand: '' },
    inverter: { capacityKw: 5, efficiency: 96, type: 'string', brand: '' },
    battery:  { enabled: false, capacityKwh: 5, efficiency: 90, costTHB: 75000 },
    mounting: { tilt: 15, azimuth: 'south' },  // azimuth: south | east | west | north
  };

  const DEFAULT_ADVANCED = {
    rateEscalation:   { enabled: true,  rate: 3 },     // % per year
    panelDegradation: { enabled: true,  rate: 0.5 },   // % per year
    netMetering:      { enabled: true,  rate: 2.20 },  // THB/kWh buyback
    vat:              { enabled: true,  rate: 7 },     // % applied to install + battery cost
    darkMode: false,
  };

  function panelTotalKw(eq)     { return (eq.panels.watts * eq.panels.count) / 1000; }
  function effectiveSystemKw(eq){ return Math.min(panelTotalKw(eq), eq.inverter.capacityKw); }
  function dcAcRatio(eq)        { return eq.inverter.capacityKw > 0 ? panelTotalKw(eq) / eq.inverter.capacityKw : 0; }

  /**
   * Total install cost used for break-even / ROI calculations.
   * = (solar installation cost + battery cost) × (1 + VAT%)
   * Without this, enabling the battery toggle adds savings but no cost,
   * making ROI artificially optimistic. VAT is applied on top when enabled
   * (typical Thai contractor quotes that exclude VAT).
   */
  function totalInstallCost(system, equipment, adv) {
    const sysCost = Number(system && system.installationCostTHB) || 0;
    const bat     = equipment && equipment.battery;
    const batCost = (bat && bat.enabled) ? (Number(bat.costTHB) || 0) : 0;
    const subtotal = sysCost + batCost;
    const vat = (adv && adv.vat && adv.vat.enabled) ? (Number(adv.vat.rate) || 0) / 100 : 0;
    return subtotal * (1 + vat);
  }

  function azimuthFactor(az) {
    return ({ south: 1.0, east: 0.93, west: 0.93, north: 0.78 })[az] || 1.0;
  }
  function tiltFactor(tilt) {
    // Optimal ~15° for Thailand (latitude). ~0.5% loss per degree off
    return Math.max(0.85, 1 - 0.005 * Math.abs(tilt - 15));
  }
  function clippingFactor(eq) {
    const r = dcAcRatio(eq);
    return r > 1.2 ? Math.max(0.92, 1 - (r - 1.2) * 0.05) : 1.0;
  }
  /** Adjusted PR derived from equipment specs */
  function adjustedPR(eq) {
    const inv  = (eq.inverter.efficiency || 96) / 100;
    const tilt = tiltFactor(eq.mounting.tilt);
    const azim = azimuthFactor(eq.mounting.azimuth);
    const clip = clippingFactor(eq);
    // Base 0.85 (cabling + soiling + thermal) × inverter × tilt × azimuth × clipping
    return 0.85 * inv * tilt * azim * clip;
  }

  // Default Thai residential tariff approximations (incl. Ft + VAT, edit as needed)
  // Flat:    ~4.5 THB/kWh (PEA/MEA Type 1)
  // TOU:     On-peak  ~5.80 THB/kWh (จันทร์–ศุกร์ 09:00–22:00)
  //          Off-peak ~2.63 THB/kWh (อื่น ๆ + เสาร์–อาทิตย์ + วันหยุด)
  const DEFAULT_TARIFF = {
    mode: 'flat',          // 'flat' | 'tou'
    flatRate:    4.50,
    onPeakRate:  5.80,
    offPeakRate: 2.63,
  };

  /** Effective rate weighted by daytime % (used to convert THB bill -> kWh) */
  function effectiveRate(tariff, daytimePct) {
    if (tariff.mode === 'flat') return tariff.flatRate;
    const d = Math.max(0, Math.min(100, daytimePct)) / 100;
    return tariff.onPeakRate * d + tariff.offPeakRate * (1 - d);
  }

  // ==========================================================================
  // APPLIANCE CATALOG
  // ==========================================================================
  // Days of week: index 0=จ (Mon) ... 6=อา (Sun); 5,6 = weekend (all off-peak)
  const ALL_DAYS    = [true,  true,  true,  true,  true,  true,  true];
  const WEEKDAYS    = [true,  true,  true,  true,  true,  false, false];
  const WEEKEND     = [false, false, false, false, false, true,  true];
  const DAY_LABELS  = ['จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส', 'อา'];
  const DAY_FULL    = ['จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์','อาทิตย์'];

  // Window definitions (Thai TOU + solar)
  const ON_PEAK_START = 9;   // 09:00
  const ON_PEAK_END   = 22;  // 22:00 (weekdays only)
  const SOLAR_START   = 6;   // ~06:00
  const SOLAR_END     = 18;  // ~18:00

  const WEEKDAY_FRACTION = 5/7;
  const WEEKEND_FRACTION = 2/7;
  // Within solar window (6-18 = 12 hrs): on-peak (9-18 = 9 hrs) vs off-peak (6-9 = 3 hrs)
  const SOLAR_WINDOW_ONPEAK_RATIO  = 9/12;
  const SOLAR_WINDOW_OFFPEAK_RATIO = 3/12;
  // Within night window (18-6 = 12 hrs): on-peak (18-22 = 4 hrs) vs off-peak (22-6 = 8 hrs)
  const NIGHT_WINDOW_ONPEAK_RATIO  = 4/12;
  const NIGHT_WINDOW_OFFPEAK_RATIO = 8/12;

  /** List of running hours (0..23) given start/end. Handles full-day & midnight wrap. */
  function runningHours(start, end) {
    const s = Math.max(0, Math.min(24, Number(start) || 0));
    const e = Math.max(0, Math.min(24, Number(end)   || 0));
    if (s === 0 && e === 24) return Array.from({ length: 24 }, (_, i) => i);
    if (s === e) return [];
    const out = [];
    if (e > s) {
      for (let h = Math.floor(s); h < Math.ceil(e); h++) out.push(h);
    } else {
      for (let h = Math.floor(s); h < 24; h++) out.push(h);
      for (let h = 0; h < Math.ceil(e); h++) out.push(h);
    }
    return out;
  }
  function isOnPeakHour(h)  { return h >= ON_PEAK_START && h < ON_PEAK_END; }
  function isSolarHour(h)   { return h >= SOLAR_START   && h < SOLAR_END;   }
  function formatHour(h) {
    const hr = Math.floor(h);
    const mn = Math.round((h - hr) * 60);
    return String(hr).padStart(2,'0') + ':' + String(mn).padStart(2,'0');
  }

  // Defaults: typical times of day people use these appliances
  const DEFAULT_SEER = 13;  // typical Thai inverter AC
  const APPLIANCE_CATALOG = [
    { key: 'ac9000',     name: 'เครื่องปรับอากาศ 9,000 BTU',  btu: 9000,  watts: 692,   defaultSeer: DEFAULT_SEER, loadFactor: 0.55, defaultStart: 18, defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'ac12000',    name: 'เครื่องปรับอากาศ 12,000 BTU', btu: 12000, watts: 923,   defaultSeer: DEFAULT_SEER, loadFactor: 0.55, defaultStart: 18, defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'ac18000',    name: 'เครื่องปรับอากาศ 18,000 BTU', btu: 18000, watts: 1385,  defaultSeer: DEFAULT_SEER, loadFactor: 0.55, defaultStart: 18, defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'ac24000',    name: 'เครื่องปรับอากาศ 24,000 BTU', btu: 24000, watts: 1846,  defaultSeer: DEFAULT_SEER, loadFactor: 0.55, defaultStart: 18, defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'ac36000',    name: 'เครื่องปรับอากาศ 36,000 BTU', btu: 36000, watts: 2769,  defaultSeer: DEFAULT_SEER, loadFactor: 0.55, defaultStart: 18, defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'evcharge7',  name: 'เครื่องชาร์จรถ EV (7 kW)',     watts: 7000,  defaultStart: 22, defaultEnd: 4,  defaultDays: ALL_DAYS },
    { key: 'evcharge11', name: 'เครื่องชาร์จรถ EV (11 kW)',    watts: 11000, defaultStart: 22, defaultEnd: 3,  defaultDays: ALL_DAYS },
    { key: 'waterheater',name: 'เครื่องทำน้ำอุ่น (3.5 kW)',    watts: 3500,  defaultStart: 6,  defaultEnd: 7,  defaultDays: ALL_DAYS },
    { key: 'iron',       name: 'เตารีดไฟฟ้า',                  watts: 1200,  defaultStart: 6,  defaultEnd: 7,  defaultDays: WEEKDAYS },
    { key: 'microwave',  name: 'ไมโครเวฟ',                     watts: 1000,  defaultStart: 12, defaultEnd: 13, defaultDays: ALL_DAYS },
    { key: 'washing',    name: 'เครื่องซักผ้า',                 watts: 500,   defaultStart: 9,  defaultEnd: 10, defaultDays: WEEKEND  },
    { key: 'dryer',      name: 'เครื่องอบผ้า',                  watts: 2500,  defaultStart: 10, defaultEnd: 11, defaultDays: WEEKEND  },
    { key: 'pool',       name: 'ปั๊มสระว่ายน้ำ',                 watts: 1500,  defaultStart: 9,  defaultEnd: 13, defaultDays: ALL_DAYS },
    { key: 'oven',       name: 'เตาอบไฟฟ้า',                   watts: 2000,  defaultStart: 18, defaultEnd: 19, defaultDays: ALL_DAYS },
    { key: 'fridge',     name: 'ตู้เย็น (ขนาดใหญ่)',             watts: 200,   loadFactor: 0.35, defaultStart: 0,  defaultEnd: 24, defaultDays: ALL_DAYS },
    { key: 'tv',         name: 'ทีวี LED 55"',                 watts: 120,   defaultStart: 19, defaultEnd: 23, defaultDays: ALL_DAYS },
    { key: 'desktop',    name: 'คอมพิวเตอร์ตั้งโต๊ะ',            watts: 350,   defaultStart: 9,  defaultEnd: 17, defaultDays: WEEKDAYS },
    { key: 'custom',     name: 'อื่นๆ (กำหนดเอง)',              watts: 1000,  defaultStart: 12, defaultEnd: 13, defaultDays: ALL_DAYS },
  ];

  /** Allow empty input for better UX — backspace works without snapping to 0 */
  function nv(v) { return v === '' ? '' : Number(v); }

  function createAppliance(t) {
    return {
      id: t.key + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,7),
      name: t.name, watts: t.watts, quantity: 1,
      btu: t.btu || null,
      seer: t.defaultSeer || null,
      loadFactor: t.loadFactor != null ? t.loadFactor : 1.0,
      startHour:  t.defaultStart != null ? t.defaultStart : 18,
      endHour:    t.defaultEnd   != null ? t.defaultEnd   : 22,
      daysOfWeek: t.defaultDays  ? [...t.defaultDays] : [...ALL_DAYS],
    };
  }

  // ==========================================================================
  // CALCULATION ENGINE (tariff-aware)
  // ==========================================================================
  /**
   * Classify each running hour into 4 mutually-exclusive buckets:
   *
   *   ┌──────────────────┬───────────────────┬──────────────────┐
   *   │                  │  Solar (06–18)    │  No Solar        │
   *   ├──────────────────┼───────────────────┼──────────────────┤
   *   │ Weekday on-peak  │ solarOnPeak       │ noSolarOnPeak ⚠  │  ← can't offset!
   *   │ (Mon–Fri 09–22)  │ (best — solar at  │ (pay on-peak rate│
   *   │                  │  on-peak rate)    │  with no sun)    │
   *   ├──────────────────┼───────────────────┼──────────────────┤
   *   │ Off-peak         │ solarOffPeak      │ noSolarOffPeak   │
   *   │                  │ (solar at off-pk) │ (battery only)   │
   *   └──────────────────┴───────────────────┴──────────────────┘
   *
   * Weekend hours are ALL off-peak under Thai TOU, regardless of the time of day.
   * Solar can offset any hour in 06–18 (weekday OR weekend).
   */
  function applianceKwhSplit(a) {
    const days = a.daysOfWeek || ALL_DAYS;
    const weekdayCount = days.slice(0, 5).filter(Boolean).length;
    const weekendCount = days.slice(5, 7).filter(Boolean).length;
    const wkdDays = weekdayCount * (30 / 7);
    const wkeDays = weekendCount * (30 / 7);

    const hours    = runningHours(a.startHour, a.endHour);
    const totalHrs = hours.length;

    // Hour counts for the 4 buckets
    let wkdSolarOnPeakHrs    = 0;   // weekday, in 9–18 (solar AND on-peak)
    let wkdSolarOffPeakHrs   = 0;   // weekday, in 6–9 (solar AND off-peak)
    let wkdNoSolarOnPeakHrs  = 0;   // weekday, in 18–22 (on-peak NO sun) ⚠ THE PROBLEM HOURS
    let wkdNoSolarOffPeakHrs = 0;   // weekday, in 22–6 (off-peak NO sun)
    let wkeSolarHrs          = 0;   // weekend, in 6–18 (solar, billed off-peak)
    let wkeNoSolarHrs        = 0;   // weekend, outside 6–18 (no sun, off-peak)

    for (const h of hours) {
      const onPeak = isOnPeakHour(h);
      const solar  = isSolarHour(h);
      // Weekday classification
      if (solar  && onPeak) wkdSolarOnPeakHrs++;
      if (solar  && !onPeak) wkdSolarOffPeakHrs++;
      if (!solar && onPeak) wkdNoSolarOnPeakHrs++;
      if (!solar && !onPeak) wkdNoSolarOffPeakHrs++;
      // Weekend classification (always off-peak billing)
      if (solar)  wkeSolarHrs++;
      else        wkeNoSolarHrs++;
    }

    const lf = Number(a.loadFactor) || 1.0;  // load factor / duty cycle
    const W = (Number(a.watts) * Math.max(Number(a.quantity), 1) * lf) / 1000;   // effective kW

    // Monthly kWh per bucket
    const solarOnPeakKwh    = W * wkdSolarOnPeakHrs    * wkdDays;
    const solarOffPeakKwh   = W * wkdSolarOffPeakHrs   * wkdDays + W * wkeSolarHrs   * wkeDays;
    const noSolarOnPeakKwh  = W * wkdNoSolarOnPeakHrs  * wkdDays;
    const noSolarOffPeakKwh = W * wkdNoSolarOffPeakHrs * wkdDays + W * wkeNoSolarHrs * wkeDays;

    // Billing: pay on-peak rate iff hour is in weekday on-peak window
    const onPeakBilledKwh   = solarOnPeakKwh + noSolarOnPeakKwh;
    const offPeakBilledKwh  = solarOffPeakKwh + noSolarOffPeakKwh;

    // Solar-offsettable (must be in solar window) vs not (need grid or battery)
    const dayKwh   = solarOnPeakKwh + solarOffPeakKwh;
    const nightKwh = noSolarOnPeakKwh + noSolarOffPeakKwh;
    const totalKwh = dayKwh + nightKwh;

    // Hour counts for UI (weekday-only counts; weekend is shown via days-of-week toggle)
    const onPeakHrs         = wkdSolarOnPeakHrs + wkdNoSolarOnPeakHrs;   // weekday on-peak
    const offPeakHrs        = wkdSolarOffPeakHrs + wkdNoSolarOffPeakHrs; // weekday off-peak
    const solarHrs          = wkdSolarOnPeakHrs + wkdSolarOffPeakHrs;    // weekday solar window
    const noSolarOnPeakHrs  = wkdNoSolarOnPeakHrs;                       // ⚠ on-peak no sun
    const noSolarOffPeakHrs = wkdNoSolarOffPeakHrs;                      // off-peak no sun

    return {
      // Per-bucket kWh
      solarOnPeakKwh, solarOffPeakKwh, noSolarOnPeakKwh, noSolarOffPeakKwh,
      // Aggregate kWh
      dayKwh, nightKwh, totalKwh,
      onPeakBilledKwh, offPeakBilledKwh,
      // Hour breakdown (for UI)
      weekdayCount, weekendCount,
      onPeakHrs, offPeakHrs, solarHrs, totalHrs,
      noSolarOnPeakHrs, noSolarOffPeakHrs,
    };
  }

  function appliancesDayKwh(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).dayKwh, 0);
  }
  function appliancesNightKwh(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).nightKwh, 0);
  }

  /**
   * Count how many running hours of an appliance fall inside an arbitrary
   * time window [winStart, winEnd) — supports midnight wrap (e.g. 18→6).
   */
  function hoursInWindow(applianceHours, winStart, winEnd) {
    const inWin = (h) => {
      if (winStart === winEnd) return false;
      if (winStart < winEnd) return h >= winStart && h < winEnd;
      // wraps past midnight
      return h >= winStart || h < winEnd;
    };
    let n = 0;
    for (const h of applianceHours) if (inWin(h)) n++;
    return n;
  }

  /**
   * kWh per month for a single appliance inside an arbitrary time window.
   * Counts ALL days the appliance is configured for (weekdays + weekends).
   */
  function applianceKwhInWindow(a, winStart, winEnd) {
    const days         = a.daysOfWeek || ALL_DAYS;
    const weekdayCount = days.slice(0, 5).filter(Boolean).length;
    const weekendCount = days.slice(5, 7).filter(Boolean).length;
    const totalDays    = (weekdayCount + weekendCount) * (30 / 7);
    const hrs          = hoursInWindow(runningHours(a.startHour, a.endHour), winStart, winEnd);
    const lf           = Number(a.loadFactor) || 1.0;
    const W            = (Number(a.watts) * Math.max(Number(a.quantity), 1) * lf) / 1000;
    return W * hrs * totalDays;
  }

  function appliancesKwhInWindow(items, winStart, winEnd) {
    return items.reduce((s, a) => s + applianceKwhInWindow(a, winStart, winEnd), 0);
  }
  function appliancesSolarOnPeak(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).solarOnPeakKwh, 0);
  }
  function appliancesSolarOffPeak(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).solarOffPeakKwh, 0);
  }
  function appliancesOnPeakBilled(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).onPeakBilledKwh, 0);
  }
  function appliancesOffPeakBilled(items) {
    return items.reduce((s, a) => s + applianceKwhSplit(a).offPeakBilledKwh, 0);
  }
  function appliancesMonthlyKwh(items) {
    return appliancesDayKwh(items) + appliancesNightKwh(items);
  }

  function consumptionFromInput(input, tariff) {
    if (input.mode === 'estimated') {
      // Bill -> kWh using a weighted average rate based on daytime split
      const avgRate = effectiveRate(tariff, input.daytimeUsagePercent);
      const monthlyKwh = avgRate > 0 ? input.monthlyBillTHB / avgRate : 0;
      const daytimeKwh   = monthlyKwh * (input.daytimeUsagePercent / 100);
      const nighttimeKwh = monthlyKwh - daytimeKwh;

      // Approximate on-peak/off-peak split for billing & solar offset.
      //   Weekday: 5/7 days; weekend: 2/7 days
      //   Within solar window 6-18 (12 hrs): 9-18 (9 hrs) is on-peak, 6-9 (3 hrs) is off-peak
      //   Within night window 18-6  (12 hrs): 18-22 (4 hrs) is on-peak, 22-6 (8 hrs) is off-peak
      const dayWkd  = daytimeKwh   * WEEKDAY_FRACTION;
      const dayWke  = daytimeKwh   * WEEKEND_FRACTION;
      const nightWkd= nighttimeKwh * WEEKDAY_FRACTION;
      const nightWke= nighttimeKwh * WEEKEND_FRACTION;

      const solarOnPeakReplaceable  = dayWkd  * SOLAR_WINDOW_ONPEAK_RATIO;
      const solarOffPeakReplaceable = dayWkd  * SOLAR_WINDOW_OFFPEAK_RATIO + dayWke;
      const onPeakBilledKwh  = dayWkd * SOLAR_WINDOW_ONPEAK_RATIO + nightWkd * NIGHT_WINDOW_ONPEAK_RATIO;
      const offPeakBilledKwh = monthlyKwh - onPeakBilledKwh;

      return {
        monthlyKwh, daytimeKwh, nighttimeKwh,
        monthlyBillTHB: input.monthlyBillTHB,
        onPeakBilledKwh, offPeakBilledKwh,
        solarOnPeakReplaceable, solarOffPeakReplaceable,
      };
    }
    // Detailed mode — use precise per-appliance hourly classification
    const appOnPeakBilled  = appliancesOnPeakBilled(input.appliances);
    const appOffPeakBilled = appliancesOffPeakBilled(input.appliances);
    const appSolarOnPeak   = appliancesSolarOnPeak(input.appliances);
    const appSolarOffPeak  = appliancesSolarOffPeak(input.appliances);
    const applianceDay     = appliancesDayKwh(input.appliances);
    const applianceNight   = appliancesNightKwh(input.appliances);

    // Baseline (lighting, fridge, etc.) split using the same approximations
    const baselineDay     = input.baselineKwhMonth * (input.baselineDaytimePercent / 100);
    const baselineNight   = input.baselineKwhMonth - baselineDay;
    const bDayWkd  = baselineDay   * WEEKDAY_FRACTION;
    const bDayWke  = baselineDay   * WEEKEND_FRACTION;
    const bNightWkd= baselineNight * WEEKDAY_FRACTION;
    const bNightWke= baselineNight * WEEKEND_FRACTION;

    const bSolarOnPeak  = bDayWkd  * SOLAR_WINDOW_ONPEAK_RATIO;          // weekday 9-18
    const bSolarOffPeak = bDayWkd  * SOLAR_WINDOW_OFFPEAK_RATIO + bDayWke; // weekday 6-9 + weekend day
    const bOnPeakBilled = bDayWkd  * SOLAR_WINDOW_ONPEAK_RATIO + bNightWkd * NIGHT_WINDOW_ONPEAK_RATIO;
    const bOffPeakBilled= (baselineDay + baselineNight) - bOnPeakBilled;

    const daytimeKwh   = applianceDay   + baselineDay;
    const nighttimeKwh = applianceNight + baselineNight;
    const monthlyKwh   = daytimeKwh + nighttimeKwh;

    const onPeakBilledKwh         = appOnPeakBilled  + bOnPeakBilled;
    const offPeakBilledKwh        = appOffPeakBilled + bOffPeakBilled;
    const solarOnPeakReplaceable  = appSolarOnPeak   + bSolarOnPeak;
    const solarOffPeakReplaceable = appSolarOffPeak  + bSolarOffPeak;

    // Bill: TOU uses split rates; flat uses single rate
    const monthlyBillTHB = tariff.mode === 'flat'
      ? monthlyKwh * tariff.flatRate
      : onPeakBilledKwh * tariff.onPeakRate + offPeakBilledKwh * tariff.offPeakRate;

    return {
      monthlyKwh, daytimeKwh, nighttimeKwh, monthlyBillTHB,
      onPeakBilledKwh, offPeakBilledKwh,
      solarOnPeakReplaceable, solarOffPeakReplaceable,
    };
  }

  /** Array of 12 monthly solar generation values (kWh) */
  function monthlySolarKwhArray(sizeKw, region, pr) {
    const psh = REGIONS[region].psh;
    return psh.map((p, i) => p * DAYS_IN_MONTH[i] * sizeKw * pr);
  }
  /** Total annual solar generation (kWh) */
  function annualSolarKwh(sizeKw, region, pr) {
    return monthlySolarKwhArray(sizeKw, region, pr).reduce((a, b) => a + b, 0);
  }

  function breakEvenYears(cost, savings) {
    return savings <= 0 ? Infinity : cost / savings;
  }

  function recommendSystemSize(daytimeKwhMonth, region, pr, nighttimeKwhMonth = 0) {
    if (daytimeKwhMonth <= 0) {
      // No daytime usage; suggest small system for battery charging if night usage exists
      return nighttimeKwhMonth > 0 ? 1.0 : 0;
    }
    // Annual avg PSH × ~30.4 days × PR for sizing
    const ideal  = daytimeKwhMonth / (avgPsh(region) * (365 / 12) * pr);
    const target = ideal * 0.9;
    return Math.max(Math.round(target * 2) / 2, 1.0);
  }

  function calculate(input, system, tariff, region, pr, equipment, adv) {
    const c = consumptionFromInput(input, tariff);
    const { monthlyKwh, daytimeKwh, nighttimeKwh, monthlyBillTHB,
            solarOnPeakReplaceable, solarOffPeakReplaceable } = c;

    const monthlySolar = monthlySolarKwhArray(system.systemSizeKw, region, pr);
    const annualGen    = monthlySolar.reduce((a, b) => a + b, 0);

    // Month-by-month allocation:
    // 1. Solar offsets on-peak demand FIRST (saves at on-peak rate — most valuable)
    // 2. Then off-peak demand within solar window (weekday 6-9 + weekend daytime)
    // 3. Excess solar charges battery → discharges at night (18:00–06:00)
    //    Battery night window: weekday 18–22 = on-peak (4h), 22–06 = off-peak (8h)
    //    Weekend: all off-peak (12h)
    const battery = equipment ? equipment.battery : null;
    const batMonthlyCap = (battery && battery.enabled)
      ? battery.capacityKwh * (battery.efficiency / 100) * 30
      : 0;

    // Battery discharge on-peak fraction: weekday 18:00-22:00 = 4 hrs on-peak out of 12 hrs night
    // Weekday fraction = 5/7, on-peak night fraction = 4/12
    const BAT_ONPEAK_FRAC  = (5/7) * (4/12);   // ~23.8%
    const BAT_OFFPEAK_FRAC = 1 - BAT_ONPEAK_FRAC; // ~76.2%

    let annualOnPeakOff   = 0;
    let annualOffPeakOff  = 0;
    let annualBatteryOff  = 0;
    let annualExcess      = 0;

    for (let m = 0; m < 12; m++) {
      const solarM = monthlySolar[m];
      // Step 1: solar → on-peak demand (most valuable: saves at on-peak rate)
      const onPeakUsed = Math.min(solarOnPeakReplaceable, solarM);
      let remaining   = solarM - onPeakUsed;

      // Step 2: solar → battery charging BEFORE off-peak daytime offset
      //   Why? Battery discharges at night spanning on-peak (18–22 weekdays)
      //   so blended battery rate (~3.38฿) > off-peak daytime rate (2.63฿).
      //   Charging battery first maximizes total savings.
      let batteryUsed = 0;
      if (battery && battery.enabled && remaining > 0) {
        const eff = battery.efficiency / 100;
        const daysInMonth = DAYS_IN_MONTH[m];
        const dailyRemaining = remaining / daysInMonth;
        // Battery can charge up to its capacity per day
        const dailyNightDemand = nighttimeKwh / daysInMonth;
        const dailyMaxDischarge = Math.min(battery.capacityKwh * eff, dailyNightDemand);
        const dailyChargeNeeded = dailyMaxDischarge / eff;
        const dailyActualCharge = Math.min(dailyRemaining, dailyChargeNeeded);
        batteryUsed = dailyActualCharge * eff * daysInMonth;
        remaining -= dailyActualCharge * daysInMonth;
      }

      // Step 3: solar → off-peak in solar window (remaining after battery)
      const offPeakUsed = Math.min(solarOffPeakReplaceable, remaining);
      remaining -= offPeakUsed;

      annualOnPeakOff  += onPeakUsed;
      annualOffPeakOff += offPeakUsed;
      annualBatteryOff += batteryUsed;
      annualExcess     += Math.max(remaining, 0);
    }

    const annualSolarOff = annualOnPeakOff + annualOffPeakOff;     // direct solar (no battery)
    const annualTotalOff = annualSolarOff + annualBatteryOff;       // including battery

    // Apply rates — battery discharge spans on-peak (18–22 weekdays) AND off-peak
    const onPeakRate  = tariff.mode === 'flat' ? tariff.flatRate : tariff.onPeakRate;
    const offPeakRate = tariff.mode === 'flat' ? tariff.flatRate : tariff.offPeakRate;
    const batBlendedRate = BAT_ONPEAK_FRAC * onPeakRate + BAT_OFFPEAK_FRAC * offPeakRate;
    const annualBatterySavings = annualBatteryOff * batBlendedRate;
    let yearly = annualOnPeakOff  * onPeakRate
               + annualOffPeakOff * offPeakRate
               + annualBatterySavings;

    // ⭐ Net Metering: sell wasted excess solar back to the grid (Year-1 revenue)
    const nmEnabled = !!(adv && adv.netMetering && adv.netMetering.enabled);
    const nmRate    = nmEnabled ? (Number(adv.netMetering.rate) || 2.20) : 0;
    const nmRevenueYear = nmRate * annualExcess;
    yearly += nmRevenueYear;

    const annNoSolar  = monthlyBillTHB * MONTHS_PER_YEAR;
    const annWith     = Math.max(annNoSolar - yearly, 0);
    const recommended = recommendSystemSize(daytimeKwh, region, pr, nighttimeKwh);

    // ⭐ Break-even: when escalation/degradation is on, simple cost÷savings is wrong.
    //   Use projection (which respects rateFactor & solarFactor) and find the cross-over year.
    //   Cost basis = (solar install + battery cost) × (1 + VAT%) when VAT is enabled —
    //   so toggling battery or VAT on now correctly increases the investment to amortize.
    const totalCost = totalInstallCost(system, equipment, adv);
    let bev = breakEvenYears(totalCost, yearly);
    const hasYearlyAdv = !!(adv && (
      (adv.rateEscalation   && adv.rateEscalation.enabled) ||
      (adv.panelDegradation && adv.panelDegradation.enabled)
    ));
    if (hasYearlyAdv && yearly > 0) {
      const tempResult = {
        annualBillNoSolarTHB: annNoSolar,
        annualSavingsTHB:     yearly,   // already includes nmRevenue
      };
      const proj = buildYearlyProjection(tempResult, totalCost, adv, 30);
      for (let y = 1; y <= 30; y++) {
        const row = proj[y];
        if (row && row.cumulativeWithSolar <= row.cumulativeNoSolar) {
          // Linear-interpolate within the crossover year for sub-year accuracy
          const prev = proj[y - 1];
          if (prev) {
            const prevDiff = prev.cumulativeWithSolar - prev.cumulativeNoSolar;
            const currDiff = row.cumulativeWithSolar  - row.cumulativeNoSolar;
            bev = (prevDiff > 0 && currDiff <= 0)
              ? (y - 1) + prevDiff / (prevDiff - currDiff)
              : y;
          } else {
            bev = y;
          }
          break;
        }
      }
    }

    // Coverage = how much of the *replaceable* demand was actually offset
    const annualReplaceable = (solarOnPeakReplaceable + solarOffPeakReplaceable) * 12;
    const coverage = annualReplaceable > 0
      ? (annualSolarOff / annualReplaceable) * 100 : 0;

    // Battery detail fields for UI display
    const batCapacity = (battery && battery.enabled) ? battery.capacityKwh : 0;
    const batEff      = (battery && battery.enabled) ? battery.efficiency / 100 : 0;
    const avgDailyBatCharge  = annualBatteryOff > 0 ? (annualBatteryOff / batEff) / 365 : 0;
    const avgDailyBatDischarge = annualBatteryOff / 365;
    const nightCoverage = (nighttimeKwh * 12) > 0
      ? (annualBatteryOff / (nighttimeKwh * 12)) * 100 : 0;

    return {
      monthlyKwh, daytimeKwh, nighttimeKwh, monthlyBillTHB,
      onPeakBilledKwh: c.onPeakBilledKwh, offPeakBilledKwh: c.offPeakBilledKwh,
      solarOnPeakReplaceable, solarOffPeakReplaceable,
      monthlySolarKwh: annualGen / 12,
      monthlySolarOffsetKwh: annualSolarOff / 12,
      annualSolarKwh: annualGen,
      annualSolarOffsetKwh: annualTotalOff,
      annualDayOffsetKwh: annualSolarOff,
      annualOnPeakOffsetKwh: annualOnPeakOff,
      annualOffPeakOffsetKwh: annualOffPeakOff,
      annualBatteryOffsetKwh: annualBatteryOff,
      annualBatterySavingsTHB: annualBatterySavings,  // battery-only savings
      annualBatteryOnPeakKwh:  annualBatteryOff * BAT_ONPEAK_FRAC,
      annualBatteryOffPeakKwh: annualBatteryOff * BAT_OFFPEAK_FRAC,
      batBlendedRate,
      avgDailyBatCharge,      // kWh charged per day (before efficiency)
      avgDailyBatDischarge,   // kWh discharged per day (after efficiency)
      nightCoveragePercent: Math.min(nightCoverage, 100),
      annualSolarExcessKwh: annualExcess,    // wasted solar (or sold via net metering)
      annualNetMeteringTHB: nmRevenueYear,   // Year-1 net metering revenue (already in yearly)
      annualSavingsTHB: yearly,              // includes net metering + battery
      annualBillNoSolarTHB: annNoSolar,
      annualBillWithSolarTHB: annWith,
      totalInstallCostTHB: totalCost,        // solar + battery (if any) — used by break-even/ROI
      breakEvenYears: bev,
      recommendedSizeKw: recommended,
      coveragePercent: Math.min(coverage, 999),
      effectiveRate: effectiveRate(tariff,
        monthlyKwh > 0 ? (daytimeKwh / monthlyKwh) * 100 : 50),
    };
  }

  function buildYearlyProjection(result, cost, adv, years = PROJECTION_YEARS) {
    // NOTE: net metering revenue is already inside result.annualSavingsTHB
    //       (added by calculate()). Don't double-count it here.
    const rows = [];
    let cumNo = 0, cumWith = cost;
    const esc  = (adv && adv.rateEscalation && adv.rateEscalation.enabled)     ? (Number(adv.rateEscalation.rate) || 3) / 100   : 0;
    const deg  = (adv && adv.panelDegradation && adv.panelDegradation.enabled) ? (Number(adv.panelDegradation.rate) || 0.5) / 100 : 0;
    for (let y = 0; y <= years; y++) {
      if (y > 0) {
        const rateFactor  = Math.pow(1 + esc, y - 1);   // tariff goes up each year
        const solarFactor = Math.pow(1 - deg, y - 1);   // panels degrade each year
        const billNoSolar = result.annualBillNoSolarTHB * rateFactor;
        // Savings escalate with rate AND degrade with panel — net metering revenue inside
        const savings     = result.annualSavingsTHB * solarFactor * rateFactor;
        cumNo   += billNoSolar;
        cumWith += Math.max(billNoSolar - savings, 0);
      }
      rows.push({
        year: y,
        cumulativeNoSolar:   Math.round(cumNo),
        cumulativeWithSolar: Math.round(cumWith),
      });
    }
    return rows;
  }

  const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  /**
   * Per-month breakdown for the chart — uses the SAME allocation as calculate():
   *   1. Solar replaces on-peak demand first (highest savings)
   *   2. Solar charges battery (discharges at night 18:00–06:00 — worth more than off-peak)
   *   3. Remaining solar offsets off-peak daytime demand
   *   4. Whatever's left is "wasted" excess solar (or sold via net metering)
   */
  function buildMonthlyBreakdown(result, system, region, pr, equipment) {
    const monthlySolar = monthlySolarKwhArray(system.systemSizeKw, region, pr);
    const onPeakRepl  = result.solarOnPeakReplaceable  || 0;
    const offPeakRepl = result.solarOffPeakReplaceable || 0;
    const battery = equipment ? equipment.battery : null;
    const batMonthlyCap = (battery && battery.enabled)
      ? battery.capacityKwh * (battery.efficiency / 100) * 30
      : 0;
    const batEff = (battery && battery.enabled) ? battery.efficiency / 100 : 0;
    const nightDemand = result.nighttimeKwh || 0;

    return THAI_MONTHS.map((label, i) => {
      const solar = monthlySolar[i];
      // Same allocation as calculate(): on-peak → battery → off-peak
      const onPeakUsed  = Math.min(onPeakRepl, solar);
      let remaining     = solar - onPeakUsed;

      // Battery charging (before off-peak daytime offset)
      let batteryUsed   = 0;
      if (battery && battery.enabled && remaining > 0) {
        const daysInMonth = DAYS_IN_MONTH[i];
        const dailyRemaining = remaining / daysInMonth;
        const dailyNightDemand = nightDemand / daysInMonth;
        const dailyMaxDischarge = Math.min(battery.capacityKwh * batEff, dailyNightDemand);
        const dailyChargeNeeded = dailyMaxDischarge / batEff;
        const dailyActualCharge = Math.min(dailyRemaining, dailyChargeNeeded);
        batteryUsed = dailyActualCharge * batEff * daysInMonth;
        remaining  -= dailyActualCharge * daysInMonth;
      }

      // Off-peak daytime offset (with remaining solar)
      const offPeakUsed = Math.min(offPeakRepl, remaining);
      remaining        -= offPeakUsed;
      const directOffset  = onPeakUsed + offPeakUsed;
      const totalOffset   = directOffset + batteryUsed;
      const excess        = Math.max(remaining, 0);
      const usage         = result.monthlyKwh;
      const gridUsage     = Math.max(usage - totalOffset, 0);
      return {
        monthLabel:     label,
        totalUsageKwh:  Math.round(usage),
        solarOffsetKwh: Math.round(directOffset),
        batteryOffsetKwh: Math.round(batteryUsed),
        solarExcessKwh: Math.round(excess),
        gridUsageKwh:   Math.round(gridUsage),
        solarGenKwh:    Math.round(solar),
        pshDay:         REGIONS[region].psh[i],
      };
    });
  }

  function formatTHB(v) {
    if (!isFinite(v)) return '-';
    return new Intl.NumberFormat('th-TH', {
      style: 'currency', currency: 'THB', maximumFractionDigits: 0
    }).format(v);
  }
  function formatRate(v) {
    if (!isFinite(v)) return '-';
    return new Intl.NumberFormat('th-TH', {
      maximumFractionDigits: 2, minimumFractionDigits: 2
    }).format(v) + ' บาท/หน่วย';
  }
  function formatNumber(v, d = 0) {
    if (!isFinite(v)) return '-';
    return new Intl.NumberFormat('th-TH', {
      maximumFractionDigits: d, minimumFractionDigits: d
    }).format(v);
  }
  function formatYears(v) {
    if (!isFinite(v)) return 'ไม่คุ้มทุน';
    const y = Math.floor(v);
    const m = Math.round((v - y) * 12);
    if (y === 0) return m + ' เดือน';
    if (m === 0) return y + ' ปี';
    return y + ' ปี ' + m + ' เดือน';
  }
  function clsx(...args) { return args.flat().filter(Boolean).join(' '); }

  // ==========================================================================
  // DETAILED MODE
  // ==========================================================================
  function DetailedMode({ value, onChange, tariff }) {
    const [selectedKey, setSelectedKey] = useState(APPLIANCE_CATALOG[0].key);

    const addAppliance = () => {
      const tpl = APPLIANCE_CATALOG.find(a => a.key === selectedKey);
      if (!tpl) return;
      onChange({ ...value, appliances: [...value.appliances, createAppliance(tpl)] });
    };
    const updateAppliance = (id, patch) => {
      onChange({ ...value, appliances: value.appliances.map(a => a.id === id ? { ...a, ...patch } : a) });
    };
    const removeAppliance = (id) => {
      onChange({ ...value, appliances: value.appliances.filter(a => a.id !== id) });
    };
    const duplicateAppliance = (id) => {
      const idx = value.appliances.findIndex(a => a.id === id);
      if (idx === -1) return;
      const orig = value.appliances[idx];
      const copy = {
        ...orig,
        id: 'dup-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        name: orig.name + ' (สำเนา)',
        daysOfWeek: [...(orig.daysOfWeek || ALL_DAYS)],
      };
      const next = [
        ...value.appliances.slice(0, idx + 1),
        copy,
        ...value.appliances.slice(idx + 1),
      ];
      onChange({ ...value, appliances: next });
    };

    const applianceDay      = appliancesDayKwh(value.appliances);
    const applianceNight    = appliancesNightKwh(value.appliances);
    const appOnPeakBilled   = appliancesOnPeakBilled(value.appliances);
    const appOffPeakBilled  = appliancesOffPeakBilled(value.appliances);
    const baselineDay       = Number(value.baselineKwhMonth) * (Number(value.baselineDaytimePercent) / 100);
    const baselineNight     = Number(value.baselineKwhMonth) - baselineDay;
    const daytimeKwh        = applianceDay + baselineDay;
    const nighttimeKwh      = applianceNight + baselineNight;
    const totalKwh          = daytimeKwh + nighttimeKwh;

    // ⭐ NEW — รวมการใช้ไฟในช่วงเวลาเฉพาะ (จากรายการเครื่องใช้ไฟฟ้า)
    //   • Off-peak ตอนเย็น 18:00–22:00 (4 ชม.)
    //   • กลางคืน 18:00–06:00 (12 ชม.)
    // หมายเหตุ: รวมโหลดพื้นฐาน (baseline) แบบสัดส่วนชั่วโมงด้วย
    const appKwhEvening   = appliancesKwhInWindow(value.appliances, 18, 22);
    const appKwhNight12   = appliancesKwhInWindow(value.appliances, 18, 6);
    // โหลดพื้นฐานช่วงกลางคืน (18–06) ใช้ค่า baselineNight ตามที่ผู้ใช้กำหนด (% กลางวัน)
    // โหลดพื้นฐานช่วงเย็น (18–22) ประมาณการเป็นสัดส่วน 4/12 ของ baselineNight
    const baselineKwhEvening = baselineNight * (4 / 12);
    const baselineKwhNight12 = baselineNight;
    const eveningKwhTotal = appKwhEvening + baselineKwhEvening;
    const nightKwhTotal   = appKwhNight12 + baselineKwhNight12;
    // ค่าไฟประมาณการของช่วงเหล่านี้ (ใช้อัตรา flat/Off-peak ตามโหมด)
    // 18–22 จันทร์–ศุกร์เป็น On-peak / เสาร์-อาทิตย์เป็น Off-peak → ใช้ค่าเฉลี่ยถ่วงน้ำหนัก 5/7-2/7
    const rateOnPeak  = tariff.mode === 'flat' ? tariff.flatRate : tariff.onPeakRate;
    const rateOffPeak = tariff.mode === 'flat' ? tariff.flatRate : tariff.offPeakRate;
    const eveningBlendedRate = (5/7) * rateOnPeak + (2/7) * rateOffPeak;
    // 18–06: weekday on-peak 4ชม + weekday off-peak 8ชม + weekend off-peak 12ชม
    //        = (5/7 × 4 + 0)/12 = 20/84 weighted on-peak
    const night12OnPeakFrac  = (5 * 4) / (7 * 12);
    const night12OffPeakFrac = 1 - night12OnPeakFrac;
    const night12BlendedRate = night12OnPeakFrac * rateOnPeak + night12OffPeakFrac * rateOffPeak;
    const eveningCost = eveningKwhTotal * eveningBlendedRate;
    const night12Cost = nightKwhTotal   * night12BlendedRate;
    // Baseline on-peak/off-peak split for TOU bill
    const bDayWkd   = baselineDay   * WEEKDAY_FRACTION;
    const bNightWkd = baselineNight * WEEKDAY_FRACTION;
    const bOnPeak   = bDayWkd * SOLAR_WINDOW_ONPEAK_RATIO + bNightWkd * NIGHT_WINDOW_ONPEAK_RATIO;
    const bOffPeak  = Number(value.baselineKwhMonth) - bOnPeak;
    const totalOnPeak  = appOnPeakBilled  + bOnPeak;
    const totalOffPeak = appOffPeakBilled + bOffPeak;
    // Bill: TOU uses real on-peak/off-peak split; flat uses single rate
    const estBill = tariff.mode === 'flat'
      ? totalKwh * tariff.flatRate
      : totalOnPeak * tariff.onPeakRate + totalOffPeak * tariff.offPeakRate;

    return (
      <div className="space-y-6">
        {/* TOU explainer */}
        <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 text-xs text-blue-900 flex items-start gap-2">
          <ClockIcon cn="w-4 h-4 shrink-0 mt-0.5 text-blue-600" />
          <div>
            ระบุ<strong>เวลาเปิด-ปิด</strong>ของเครื่องใช้ไฟฟ้า ระบบจะคำนวณให้อัตโนมัติว่า
            ตรงกับช่วงแดด (06:00-18:00),
            <strong> On-peak</strong> (จ-ศ 09:00-22:00),
            หรือ <strong>Off-peak</strong> (กลางคืน + ส-อา) กี่ชั่วโมง
          </div>
        </div>

        <div className="flex flex-col sm:flex-row gap-3">
          <select value={selectedKey} onChange={(e) => setSelectedKey(e.target.value)}
            className="flex-1 px-4 py-3 rounded-xl border border-ink-300 bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
            {APPLIANCE_CATALOG.map(a => (
              <option key={a.key} value={a.key}>
                {a.name} ({a.watts.toLocaleString()} W)
              </option>
            ))}
          </select>
          <button onClick={addAppliance}
            className="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-medium transition shadow-sm">
            <PlusIcon /> เพิ่มเครื่องใช้ไฟฟ้า
          </button>
        </div>

        <div className="space-y-3">
          {value.appliances.length === 0 && (
            <div className="text-center py-8 px-4 rounded-xl border-2 border-dashed border-ink-300 text-ink-500 text-sm">
              ยังไม่มีรายการ — เพิ่มเครื่องใช้ไฟฟ้ากำลังสูง เช่น แอร์, EV charger
            </div>
          )}
          {value.appliances.map(a => {
            const days     = a.daysOfWeek || ALL_DAYS;
            const split    = applianceKwhSplit(a);
            const dayKwh   = split.dayKwh;
            const nightKwh = split.nightKwh;
            const totKwh   = split.totalKwh;
            const noDays   = !days.some(Boolean);

            const setDays = (newDays) =>
              updateAppliance(a.id, { daysOfWeek: newDays });
            const toggleDay = (i) => {
              const d = [...days];
              d[i] = !d[i];
              setDays(d);
            };

            // Time options for dropdown (0–24)
            const timeOptions = Array.from({ length: 25 }, (_, h) => h);

            return (
              <div key={a.id} className="bg-ink-100/50 rounded-xl p-3 space-y-2.5">
                {/* Header: name + total + delete */}
                <div className="flex items-center gap-2">
                  <ZapIcon cn="w-4 h-4 text-brand-500 shrink-0" />
                  <input type="text"
                    value={a.name}
                    onChange={(e) => updateAppliance(a.id, { name: e.target.value })}
                    className="flex-1 min-w-[80px] text-sm font-medium text-ink-900 bg-transparent border-0 border-b border-transparent hover:border-ink-300 focus:border-brand-500 focus:outline-none px-1 py-0.5" />
                  {Number(a.quantity) > 1 && (
                    <span className="text-xs font-semibold text-brand-600 bg-brand-50 px-2 py-0.5 rounded-full whitespace-nowrap"
                      title={'รวม ' + formatNumber(Number(a.watts) * Number(a.quantity), 0) + ' W (' + (Number(a.watts) * Number(a.quantity) / 1000).toFixed(2) + ' kW)'}>
                      × {formatNumber(Number(a.quantity), 0)}
                    </span>
                  )}
                  <span className="text-sm text-ink-700 whitespace-nowrap font-semibold" title={formatNumber(totKwh / 30, 1) + ' kWh/วัน'}>
                    {formatNumber(totKwh, 0)} kWh
                    <span className="text-[10px] text-ink-500 font-normal ml-1">({formatNumber(totKwh / 30, 1)}/วัน)</span>
                  </span>
                  <button onClick={() => duplicateAppliance(a.id)} aria-label="ทำสำเนา" title="ทำสำเนา"

                    <div className="flex items-stretch gap-0.5 mt-0.5">

                        className="flex-1 min-w-0 px-2 py-1.5 rounded-lg border border-ink-300 text-sm bg-white" />

                      </button>
                    </div>
                  </label>

                      </span>

                          const s = nv(e.target.value);

                    </span>
                    <input type="number" min={0} step={50} value={a.watts}
                      onChange={(e) => updateAppliance(a.id, { watts: nv(e.target.value), seer: null })}
                      className={clsx('w-full mt-0.5 px-2 py-1.5 rounded-lg border text-sm bg-white',

                  <label className="block">

                      onChange={(e) => updateAppliance(a.id, { startHour: Number(e.target.value) })}

                        <option key={h} value={h}>{formatHour(h)}</option>

                  </label>
                  <label className="block">
                    <span className="text-[10px] text-red-700 uppercase tracking-wide flex items-center gap-1">
                      <ClockIcon cn="w-3 h-3" /> ปิดเวลา
                    </span>
                    <select value={a.endHour}
                      onChange={(e) => updateAppliance(a.id, { endHour: Number(e.target.value) })}
                      className="w-full mt-0.5 px-2 py-1.5 rounded-lg border border-red-200 text-sm bg-red-50/40">

                        <option key={h} value={h}>{h === 24 ? '24:00' : formatHour(h)}</option>
                      ))}
                    </select>
                  </label>
                </div>

                {/* Power total breakdown — shown only when quantity > 1 */}
                {Number(a.quantity) > 1 && (
                  <div className="flex items-center gap-1.5 text-[10px] bg-brand-50/60 border border-brand-100 rounded-lg px-2 py-1">
                    <SparkleIcon cn="w-3 h-3 text-brand-500 shrink-0" />
                    <span className="text-ink-600">
                      <strong className="text-brand-700">{formatNumber(Number(a.watts), 0)} W</strong>
                      {' × '}
                      <strong className="text-brand-700">{formatNumber(Number(a.quantity), 0)} อุปกรณ์</strong>
                      {' = '}
                      <strong className="text-brand-700">
                        {formatNumber(Number(a.watts) * Number(a.quantity), 0)} W
                        {' '}
                        ({(Number(a.watts) * Number(a.quantity) / 1000).toFixed(2)} kW)
                      </strong>
                    </span>
                  </div>
                )}

                {/* Load Factor — how much of rated power is actually consumed */}
                <div className="flex items-center gap-2 text-[10px]">
                  <span className="text-ink-500 whitespace-nowrap">⚡ ใช้จริง</span>
                  <input type="range" min={10} max={100} step={5}
                    value={Math.round((Number(a.loadFactor) || 1) * 100)}
                    onChange={(e) => updateAppliance(a.id, { loadFactor: Number(e.target.value) / 100 })}

                    'font-semibold min-w-[36px] text-right',

                    {Math.round((Number(a.loadFactor) || 1) * 100)}%

                    <span className="text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded-md">

                </div>

                      <span>
                        ใช้ {split.weekdayCount + split.weekendCount} วัน/สัปดาห์
                        {split.weekendCount > 0 && ` (รวม ส-อา ${split.weekendCount} วัน)`}
                      </span>
                    )}
                  </div>
                  <div className="flex gap-3 ml-auto">
                    <span className="text-red-600 flex items-center gap-1" title="จ-ศ 09:00–22:00">
                      <ZapIcon cn="w-3 h-3" /> On-peak <strong>{formatNumber(split.onPeakBilledKwh, 0)}</strong> kWh
                    </span>
                    <span className="text-blue-600 flex items-center gap-1" title="จ-ศ 22:00–09:00 + ส-อา ทั้งวัน">
                      <MoonIcon cn="w-3 h-3" /> Off-peak <strong>{formatNumber(split.offPeakBilledKwh, 0)}</strong> kWh
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="grid grid-cols-3 gap-3 text-center">
          <div className="bg-white border border-ink-300 rounded-xl py-3">
            <p className="text-[11px] text-ink-500">รวมต่อเดือน</p>
            <p className="font-semibold text-ink-900">{formatNumber(totalKwh, 0)} kWh</p>
          </div>
          <div className="bg-white border border-ink-300 rounded-xl py-3">
            <p className="text-[11px] text-ink-500">ค่าไฟต่อเดือน</p>
            <p className="font-semibold text-ink-900">{formatTHB(estBill)}</p>
          </div>
          <div className="bg-white border border-ink-300 rounded-xl py-3">
            <p className="text-[11px] text-ink-500">ค่าไฟต่อปี</p>
            <p className="font-semibold text-ink-900">{formatTHB(estBill * 12)}</p>
          </div>
        </div>

        {/* ⭐ NEW — สรุปการใช้ไฟตามช่วงเวลา (สำหรับวางแผนแบตเตอรี่ / โซลาร์) */}
        <div className="bg-gradient-to-br from-indigo-50 to-blue-50 border border-indigo-100 rounded-2xl p-4 space-y-3">
          <div className="flex items-center gap-2">
            <MoonIcon cn="w-4 h-4 text-indigo-600" />
            <h3 className="text-sm font-semibold text-ink-900">สรุปการใช้ไฟตามช่วงเวลา</h3>
            <span className="text-[10px] text-ink-500 ml-auto">รวม baseline + เครื่องใช้ไฟฟ้า</span>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {/* 18:00 – 22:00 — Off-peak ตอนเย็น (ไม่มีแดด) */}
            <div className="bg-white border border-indigo-200 rounded-xl p-3">
              <div className="flex items-center justify-between mb-1.5">
                <p className="text-[11px] text-ink-500 uppercase tracking-wide">
                  Off-peak ตอนเย็น
                </p>
                <span className="text-[10px] text-indigo-700 bg-indigo-100 px-1.5 py-0.5 rounded-full font-medium">
                  18:00–22:00
                </span>
              </div>
              <p className="text-2xl font-bold text-indigo-700">
                {formatNumber(eveningKwhTotal, 0)} <span className="text-sm font-normal text-ink-500">kWh/เดือน</span>
              </p>
              <div className="mt-2 pt-2 border-t border-ink-100 grid grid-cols-2 gap-2 text-[11px]">
                <div>
                  <p className="text-ink-500">เฉลี่ย/วัน</p>
                  <p className="font-semibold text-ink-900">{formatNumber(eveningKwhTotal / 30, 1)} kWh</p>
                </div>
                <div>
                  <p className="text-ink-500">โหลดเฉลี่ย</p>
                  <p className="font-semibold text-ink-900">{formatNumber(eveningKwhTotal / 30 / 4, 2)} kW</p>
                </div>
              </div>
              <p className="text-[10px] text-ink-500 mt-2 leading-snug">
                ช่วง 4 ชม. หลังพระอาทิตย์ตก — โซลาร์ผลิตไฟไม่ได้ ต้องพึ่งกริดหรือแบตเตอรี่
                · ค่าไฟประมาณ <strong>{formatTHB(eveningCost)}</strong>/เดือน
              </p>
            </div>

            {/* 18:00 – 06:00 — กลางคืนทั้งหมด */}
            <div className="bg-white border border-indigo-200 rounded-xl p-3">
              <div className="flex items-center justify-between mb-1.5">
                <p className="text-[11px] text-ink-500 uppercase tracking-wide">
                  กลางคืน (ไม่มีแดด)
                </p>
                <span className="text-[10px] text-indigo-700 bg-indigo-100 px-1.5 py-0.5 rounded-full font-medium">
                  18:00–06:00
                </span>
              </div>
              <p className="text-2xl font-bold text-indigo-700">
                {formatNumber(nightKwhTotal, 0)} <span className="text-sm font-normal text-ink-500">kWh/เดือน</span>
              </p>
              <div className="mt-2 pt-2 border-t border-ink-100 grid grid-cols-2 gap-2 text-[11px]">
                <div>
                  <p className="text-ink-500">เฉลี่ย/วัน</p>
                  <p className="font-semibold text-ink-900">{formatNumber(nightKwhTotal / 30, 1)} kWh</p>
                </div>
                <div>
                  <p className="text-ink-500">โหลดเฉลี่ย</p>
                  <p className="font-semibold text-ink-900">{formatNumber(nightKwhTotal / 30 / 12, 2)} kW</p>
                </div>
              </div>
              <p className="text-[10px] text-ink-500 mt-2 leading-snug">
                ช่วง 12 ชม. ทั้งคืน — ใช้กำหนดขนาดแบตเตอรี่ที่เหมาะสม
                · ค่าไฟประมาณ <strong>{formatTHB(night12Cost)}</strong>/เดือน
              </p>
            </div>
          </div>

          <div className="text-[11px] text-ink-500 bg-white/60 rounded-lg px-3 py-2 border border-indigo-100/60">
            💡 <strong>การใช้งาน:</strong> ตัวเลขเหล่านี้ช่วยให้คุณเลือก<strong>ขนาดแบตเตอรี่</strong>ได้เหมาะสม —
            แบตเตอรี่ควรมีความจุครอบคลุมการใช้ไฟช่วงไม่มีแดด (18:00–06:00)
            ส่วน 18:00–22:00 คือช่วงที่ใช้ไฟหนักที่สุดและจ่ายอัตรา On-peak (จ-ศ)
          </div>
        </div>
      </div>
    );
  }

  // TARIFF SETTINGS  ⭐ NEW

  function TariffSettings({ value, onChange }) {
    const [open, setOpen] = useState(true);
    const isFlat = value.mode === 'flat';

    const setMode = (mode) => onChange({ ...value, mode });
    const resetDefaults = () => onChange({ ...DEFAULT_TARIFF, mode: value.mode });

    return (
      <div className="bg-white rounded-2xl shadow-card p-6 space-y-5">
        <button
          onClick={() => setOpen(!open)}
          className="w-full flex items-center justify-between gap-2 text-left">
          <div>
            <h2 className="text-lg font-semibold text-ink-900 flex items-center gap-2">
              <ZapIcon cn="w-5 h-5 text-brand-500" />
              อัตราค่าไฟฟ้า
            </h2>
            <p className="text-sm text-ink-500">
              {isFlat
                ? `อัตราเดียว · ${formatRate(value.flatRate)}`
                : `TOU · On-peak ${formatRate(value.onPeakRate)} / Off-peak ${formatRate(value.offPeakRate)}`}
            </p>
          </div>
          <ChevronIcon cn={clsx('w-5 h-5 text-ink-500 transition-transform', open && 'rotate-180')} />
        </button>

        {open && (
          <>
            {/* Mode toggle */}
            <div className="inline-flex bg-ink-100 rounded-xl p-1 w-full">
              <button onClick={() => setMode('flat')}
                className={clsx(
                  'flex-1 px-4 py-2 rounded-lg text-sm font-medium transition',
                  isFlat ? 'bg-white shadow-sm text-brand-600' : 'text-ink-500'
                )}>อัตราเดียว (Flat)</button>
              <button onClick={() => setMode('tou')}
                className={clsx(
                  'flex-1 px-4 py-2 rounded-lg text-sm font-medium transition',
                  !isFlat ? 'bg-white shadow-sm text-brand-600' : 'text-ink-500'
                )}>อัตรา TOU</button>
            </div>

            {/* Flat */}
            {isFlat && (
              <div>
                <label className="text-sm font-medium text-ink-700 mb-2 block">
                  ราคาต่อหน่วย
                </label>
                <div className="relative">
                  <input type="number" min={0} step={0.01} value={value.flatRate}
                    onChange={(e) => onChange({ ...value, flatRate: nv(e.target.value) })}
                    className="w-full px-4 py-3 pr-24 rounded-xl border border-ink-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-lg font-medium" />
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-ink-500 text-sm">บาท/หน่วย</span>
                </div>
                <p className="text-xs text-ink-500 mt-2">
                  อัตราเฉลี่ยที่อยู่อาศัย MEA/PEA ปัจจุบัน ~4.2–4.6 บาท/หน่วย (รวม Ft + VAT)
                </p>
              </div>
            )}

            {/* TOU */}
            {!isFlat && (
              <div className="space-y-4">
                <div>
                  <label className="text-sm font-medium text-ink-700 mb-2 flex items-center gap-2">
                    <SunIcon cn="w-4 h-4 text-amber-500" />
                    On-peak (ช่วงพีค)
                  </label>
                  <div className="relative">
                    <input type="number" min={0} step={0.01} value={value.onPeakRate}
                      onChange={(e) => onChange({ ...value, onPeakRate: nv(e.target.value) })}
                      className="w-full px-4 py-3 pr-24 rounded-xl border border-ink-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-base font-medium" />
                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-ink-500 text-xs">บาท/หน่วย</span>
                  </div>
                  <p className="text-[11px] text-ink-500 mt-1">จันทร์–ศุกร์ 09:00–22:00</p>
                </div>

                <div>
                  <label className="text-sm font-medium text-ink-700 mb-2 flex items-center gap-2">
                    <MoonIcon cn="w-4 h-4 text-blue-500" />
                    Off-peak (ช่วงนอกพีค)
                  </label>
                  <div className="relative">
                    <input type="number" min={0} step={0.01} value={value.offPeakRate}
                      onChange={(e) => onChange({ ...value, offPeakRate: nv(e.target.value) })}
                      className="w-full px-4 py-3 pr-24 rounded-xl border border-ink-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-base font-medium" />
                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-ink-500 text-xs">บาท/หน่วย</span>
                  </div>
                  <p className="text-[11px] text-ink-500 mt-1">
                    จันทร์–ศุกร์ 22:00–09:00 + เสาร์–อาทิตย์ + วันหยุดราชการ
                  </p>
                </div>

                <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 text-xs text-blue-900">
                  <ClockIcon cn="w-4 h-4 inline mr-1 align-text-bottom" />
                  TOU เหมาะกับบ้านที่ใช้ไฟกลางคืนเยอะ และคุ้มกับโซลาร์มากกว่า เพราะแสงแดด
                  ทดแทนช่วง On-peak ที่แพง
                </div>
              </div>
            )}

            <button onClick={resetDefaults}
              className="w-full text-xs text-ink-500 hover:text-brand-600 transition py-2">
              คืนค่าเริ่มต้น (MEA/PEA)
            </button>
          </>
        )}
      </div>
    );
  }

    const maxIdx = r.psh.indexOf(Math.max(...r.psh));

    return (
      <div className="bg-white rounded-2xl shadow-card p-6 space-y-5">

          className="w-full flex items-center justify-between gap-2 text-left">

            <p className="text-sm text-ink-500">
              {r.name} · {yearAvg.toFixed(2)} ชม./วัน · PR {prPct}%
            </p>
          </div>
          <ChevronIcon cn={clsx('w-5 h-5 text-ink-500 transition-transform', open && 'rotate-180')} />
        </button>

        {open && <>

        <div>
          <label className="text-sm font-medium text-ink-700 mb-2 block">ภูมิภาค</label>
          <select
            value={region}
            onChange={(e) => onRegionChange(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border border-ink-300 bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
            {Object.entries(REGIONS).map(([key, reg]) => (
              <option key={key} value={key}>{reg.name}</option>
            ))}
          </select>

          <div className="grid grid-cols-3 gap-2 mt-3 text-center">
            <div className="bg-ink-100/60 rounded-lg p-2">
              <p className="text-[10px] text-ink-500 uppercase">เฉลี่ยทั้งปี</p>
              <p className="text-sm font-semibold mt-0.5">{yearAvg.toFixed(2)} ชม./วัน</p>
            </div>
            <div className="bg-ink-100/60 rounded-lg p-2">
              <p className="text-[10px] text-ink-500 uppercase">เดือนสูงสุด</p>
              <p className="text-sm font-semibold mt-0.5">
                {THAI_MONTHS[maxIdx]} · {r.psh[maxIdx].toFixed(1)}

  // ==========================================================================
  // SUMMARY CARDS
  // ==========================================================================
  function SummaryCards({ result, system, tariff, adv }) {
    const cov = result.coveragePercent;
    let covColor = 'text-ink-500';
    let covLabel = 'ระบบเล็กกว่าความต้องการ';
    if (cov >= 80 && cov <= 110) { covColor = 'text-green-600'; covLabel = 'ขนาดเหมาะสม'; }
    else if (cov > 110)          { covColor = 'text-amber-600'; covLabel = 'ระบบใหญ่เกินความจำเป็น'; }

    // Average effective rate of the actual offset (mix of on-peak + off-peak + battery savings)
    const totalOffsetKwh = (result.annualSolarOffsetKwh || 0);
    const avgOffsetRate  = totalOffsetKwh > 0
      ? (result.annualSavingsTHB - (result.annualNetMeteringTHB || 0)) / totalOffsetKwh
      : 0;
    // Detect which adv features are active
    const hasEsc = !!(adv && adv.rateEscalation   && adv.rateEscalation.enabled);
    const hasDeg = !!(adv && adv.panelDegradation && adv.panelDegradation.enabled);
    const hasNm  = !!(adv && adv.netMetering      && adv.netMetering.enabled);
    const hasVat = !!(adv && adv.vat              && adv.vat.enabled);
    const advTags = [
      hasEsc && '+ค่าไฟขึ้น ' + (adv.rateEscalation.rate || 3) + '%/ปี',
      hasDeg && '−แผงเสื่อม ' + (adv.panelDegradation.rate || 0.5) + '%/ปี',
      hasNm  && '+ขายคืน ' + (adv.netMetering.rate || 2.20) + '฿',
      hasVat && '+VAT ' + (adv.vat.rate || 7) + '%',
    ].filter(Boolean).join(' · ');

    const savingsHint = hasNm
      ? 'รวมขายคืน ' + formatTHB(result.annualNetMeteringTHB || 0) + '/ปี'
      : 'เฉลี่ย ' + formatRate(avgOffsetRate) + ' (ที่ทดแทนได้)';
    const summaryCost = result.totalInstallCostTHB != null ? result.totalInstallCostTHB : system.installationCostTHB;
    const breakEvenHint = (hasEsc || hasDeg)
      ? 'รวมค่าไฟขึ้น/แผงเสื่อมแล้ว · ' + formatTHB(summaryCost)
      : 'จากต้นทุน ' + formatTHB(summaryCost);

    const cards = [
      { icon: <SunIcon cn="w-5 h-5" />,   label: 'ขนาดระบบที่แนะนำ',
        value: result.recommendedSizeKw.toFixed(1) + ' kW',
        hint: result.daytimeKwh <= 0 && result.nighttimeKwh > 0
          ? 'ใช้ไฟกลางคืนเป็นหลัก — พิจารณาเพิ่มแบตเตอรี่'
          : 'ครอบคลุมการใช้กลางวัน 80–100%', tone: 'brand' },
      { icon: <CalcIcon cn="w-5 h-5" />,  label: 'จุดคุ้มทุน',
        value: formatYears(result.breakEvenYears),
        hint: breakEvenHint, tone: 'blue' },
      { icon: <PiggyIcon cn="w-5 h-5" />, label: 'ประหยัดต่อปี',
        value: formatTHB(result.annualSavingsTHB),
        hint: savingsHint, tone: 'green' },
      { icon: <TrendIcon cn="w-5 h-5" />, label: 'ครอบคลุมที่ทดแทนได้',
        value: formatNumber(Math.min(cov, 999), 0) + '%', hint: covLabel,
        tone: 'amber', valueClass: covColor },
    ];
    const tones = {
      brand: 'bg-brand-50 text-brand-600',
      blue:  'bg-blue-50 text-blue-600',
      green: 'bg-green-50 text-green-600',
      amber: 'bg-amber-50 text-amber-600',
    };
    return (
      <div className="space-y-3">
        {advTags && (
          <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-2 text-xs text-blue-800 flex items-center gap-2 no-print">
            <CalcIcon cn="w-4 h-4 shrink-0" />
            <span><strong>คำนวณรวมตั้งค่าขั้นสูง:</strong> {advTags}</span>
          </div>
        )}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 print-summary-hero">
          {cards.map((c, i) => (
            <div key={i} className="bg-white rounded-2xl shadow-card p-5 flex flex-col gap-3">
              <div className="flex items-center justify-between">
                <span className="text-sm text-ink-500">{c.label}</span>
                <div className={clsx('w-9 h-9 rounded-xl flex items-center justify-center', tones[c.tone])}>
                  {c.icon}
                </div>
              </div>
              <div className={clsx('text-2xl font-bold text-ink-900', c.valueClass)}>{c.value}</div>
              <p className="text-xs text-ink-500">{c.hint}</p>
            </div>
          ))}
        </div>
      </div>
    );
  }

    if (!bat || !bat.enabled) return null;
    const annBatKwh     = result.annualBatteryOffsetKwh || 0;
    if (annBatKwh <= 0) {
      // Battery enabled but no excess solar to charge it
      return (
        <div className="bg-white rounded-2xl shadow-card p-6 no-print">
          <h3 className="text-lg font-semibold text-ink-900 mb-2 flex items-center gap-2">

          </h3>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
            <strong>⚠ ไม่มีไฟส่วนเกินจากโซลาร์มาชาร์จแบต</strong>

        <p className="text-sm text-ink-500 mb-4">

        {/* Daily cycle visualization */}

              <div className="inline-flex items-center gap-1.5 text-amber-700 bg-amber-100 rounded-lg px-3 py-1 text-xs font-medium mb-2">
                <SunIcon cn="w-3.5 h-3.5" /> ☀️ ชาร์จ 06:00–18:00
              </div>
              <p className="text-xl font-bold text-amber-700">{formatNumber(dailyCharge, 1)} kWh</p>
              <p className="text-[10px] text-ink-500">จากไฟเกิน → เข้าแบต (ก่อน eff. {eff}%)</p>
            </div>
            <div className="text-center">
              <div className="inline-flex items-center gap-1.5 text-blue-700 bg-blue-100 rounded-lg px-3 py-1 text-xs font-medium mb-2">

                nightCov >= 50 ? 'text-green-600' : nightCov >= 20 ? 'text-amber-600' : 'text-red-600'

            <div className="bg-ink-100/60 rounded-xl p-3.5">

                    {formatNumber(annBatOffPeak, 0)} kWh · {formatTHB(annBatOffPeak * offPeakRate)}

                <div className="flex items-center justify-between text-xs border-t border-ink-300/40 pt-1.5">
                  <span className="text-ink-600">อัตราเฉลี่ยแบต</span>
                  <span className="font-semibold text-ink-700">{formatRate(blendedRate)}</span>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );

  // ==========================================================================
  // EXCESS SOLAR DETAIL — months with surplus + annual total ⭐ NEW
  // ==========================================================================
  function ExcessSolarDetail({ data, adv }) {
    const excessMonths = data.filter(m => m.solarExcessKwh > 0);
    const totalExcess  = data.reduce((s, m) => s + (m.solarExcessKwh || 0), 0);
    if (totalExcess <= 0) return null;
    const nmEnabled = !!(adv && adv.netMetering && adv.netMetering.enabled);
    const nmRate    = nmEnabled ? (Number(adv.netMetering.rate) || 2.20) : 0;
    const nmIncome  = nmRate * totalExcess;
    const sortedMax = [...data].sort((a, b) => b.solarExcessKwh - a.solarExcessKwh);
    const peakMonth = sortedMax[0];

    return (
