  // ==========================================================================
  // SYSTEM SIZE COMPARISON TABLE
  // ==========================================================================
  function SystemComparison({ baseResult, baseSystem, tariff, region, pr, equipment, userInput, adv }) {
    const baseSz = baseSystem.systemSizeKw;
    const sizes = [
      Math.max(1, Math.round((baseSz * 0.6) * 2) / 2),
      baseSz,
      Math.round((baseSz * 1.4) * 2) / 2,
    ].filter((v, i, a) => a.indexOf(v) === i); // dedupe

    const rows = sizes.map(sz => {
      // Scale solar install cost linearly with size; battery cost (if any) is added on top.
      const sys = { ...baseSystem, systemSizeKw: sz, installationCostTHB: Math.round(sz * (baseSystem.installationCostTHB / baseSz)) };
      const r = calculate(userInput, sys, tariff, region, pr, equipment, adv);
      const totalCost = r.totalInstallCostTHB != null ? r.totalInstallCostTHB : sys.installationCostTHB;
      const proj = buildYearlyProjection(r, totalCost, adv, 25);
      const netProfit25 = (proj[25] ? proj[25].cumulativeNoSolar - proj[25].cumulativeWithSolar : 0);
      return { sz, cost: totalCost, r, netProfit25 };
    });

    return (
      <div className="bg-white rounded-2xl shadow-card p-6 no-print">
        <h3 className="text-lg font-semibold text-ink-900 mb-1 flex items-center gap-2">
          <GridIcon cn="w-5 h-5 text-brand-500" /> เปรียบเทียบขนาดระบบ
        </h3>
        <p className="text-sm text-ink-500 mb-4">เทียบ ROI ระหว่างขนาดต่างๆ</p>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-ink-200">
                <th className="py-2 px-3 text-left text-ink-500 font-medium">รายการ</th>
                {rows.map(({ sz }) => (
                  <th key={sz} className={clsx(
                    'py-2 px-3 text-right font-semibold',
                    sz === baseSz ? 'text-brand-600 bg-brand-50/50 rounded-t-lg' : 'text-ink-700'
                  )}>
                    {sz} kW {sz === baseSz && '⭐'}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody className="text-ink-700">
              <tr className="border-b border-ink-100">
                <td className="py-2 px-3">ต้นทุนติดตั้ง</td>
                {rows.map(({ sz, cost }) => (
                  <td key={sz} className={clsx('py-2 px-3 text-right', sz === baseSz && 'bg-brand-50/50')}>
                    {formatTHB(cost)}
                  </td>
                ))}
              </tr>
              <tr className="border-b border-ink-100">
                <td className="py-2 px-3">ประหยัด/เดือน</td>
                {rows.map(({ sz, r }) => (
                  <td key={sz} className={clsx('py-2 px-3 text-right text-green-600 font-medium', sz === baseSz && 'bg-brand-50/50')}>
                    {formatTHB(r.annualSavingsTHB / 12)}
                  </td>
                ))}
              </tr>
              <tr className="border-b border-ink-100">
                <td className="py-2 px-3">จุดคุ้มทุน</td>
                {rows.map(({ sz, r }) => (
                  <td key={sz} className={clsx('py-2 px-3 text-right font-medium', sz === baseSz && 'bg-brand-50/50')}>
                    {formatYears(r.breakEvenYears)}
                  </td>
                ))}
              </tr>
              <tr className="border-b border-ink-100">
                <td className="py-2 px-3">กำไร 25 ปี</td>
                {rows.map(({ sz, netProfit25 }) => (
                  <td key={sz} className={clsx('py-2 px-3 text-right font-semibold', sz === baseSz && 'bg-brand-50/50',
                    netProfit25 > 0 ? 'text-green-600' : 'text-red-600')}>
                    {formatTHB(netProfit25)}
                  </td>
                ))}
              </tr>
              <tr>
                <td className="py-2 px-3">Solar ส่วนเกิน/ปี</td>
                {rows.map(({ sz, r }) => (
                  <td key={sz} className={clsx('py-2 px-3 text-right', sz === baseSz && 'bg-brand-50/50')}>
                    {formatNumber(r.annualSolarExcessKwh, 0)} kWh
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  // ==========================================================================
  // SHARE BUTTON — encode state to URL
  // ==========================================================================
  function ShareButton({ getExportData }) {
    const [copied, setCopied] = useState(false);
    const share = () => {
      try {
        const data = getExportData();
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const url = window.location.href.split('#')[0] + '#data=' + encoded;
        navigator.clipboard.writeText(url).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        });
      } catch (e) { alert('ไม่สามารถสร้างลิงก์ได้: ' + e.message); }
    };
    return (
      <button onClick={share}
        className="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl bg-blue-50 text-blue-700 hover:bg-blue-100 text-sm font-medium transition no-print">
        {copied ? '✅ คัดลอกแล้ว!' : <><CopyIcon cn="w-4 h-4" /> แชร์ลิงก์</>}
      </button>
    );
  }

  function DetailedSummary({ result, system, tariff, adv, equipment }) {
    // Year-1 savings (already includes net metering — added inside calculate())
    const effectiveAnnualSavings = result.annualSavingsTHB;
    const monthlySavings         = effectiveAnnualSavings / 12;
    // Net metering revenue (already counted inside annualSavingsTHB; exposed for display)
    const nmRevenueYear          = result.annualNetMeteringTHB || 0;
    // Battery savings (already counted inside annualSavingsTHB; exposed for display)
    const batSavingsYear         = result.annualBatterySavingsTHB || 0;
    const batOffsetKwhYear       = result.annualBatteryOffsetKwh || 0;
    const hasBattery             = !!(equipment && equipment.battery && equipment.battery.enabled && batOffsetKwhYear > 0);
    // Break-even (already adv-adjusted by calculate())
    const effectiveBreakEven     = result.breakEvenYears;

    // Use projection to get accurate 10/25 year totals (with escalation + degradation).
    // Total cost = solar install + battery cost (if enabled). This makes ROI honest.
    const totalCost = result.totalInstallCostTHB != null
      ? result.totalInstallCostTHB
      : system.installationCostTHB;
    const proj25 = buildYearlyProjection(result, totalCost, adv, 25);
    const cumNoSolar10  = proj25[10] ? proj25[10].cumulativeNoSolar  : result.annualBillNoSolarTHB * 10;
    const cumWithSolar10= proj25[10] ? proj25[10].cumulativeWithSolar: 0;
    const cumNoSolar25  = proj25[25] ? proj25[25].cumulativeNoSolar  : result.annualBillNoSolarTHB * 25;
    const cumWithSolar25= proj25[25] ? proj25[25].cumulativeWithSolar: 0;
    const totalSavings10Y = cumNoSolar10 - cumWithSolar10;
    const totalSavings25Y = cumNoSolar25 - cumWithSolar25;
    const netProfit10Y    = totalSavings10Y;  // cumWithSolar already includes install cost
    const netProfit25Y    = totalSavings25Y;

    const roiPercent       = totalCost > 0
      ? (effectiveAnnualSavings / totalCost) * 100 : 0;
    const annualGenKwh     = result.annualSolarKwh;
    const annualOffsetKwh  = result.annualSolarOffsetKwh;
    const annualNeedKwh    = result.monthlyKwh * 12;
    const annualGridKwh    = Math.max(annualNeedKwh - annualOffsetKwh, 0);
    // Thailand grid emission factor ~0.5 kg CO2/kWh
    const co2PerYear       = annualOffsetKwh * 0.5;
    const co2Total25Y      = co2PerYear * 25;
    const treesEquivalent  = co2PerYear / 21;   // tree absorbs ~21 kg CO2/yr

    // Hint for advanced settings effect
    const hasAdv = adv && (
      (adv.rateEscalation && adv.rateEscalation.enabled) ||
      (adv.panelDegradation && adv.panelDegradation.enabled) ||
      (adv.netMetering && adv.netMetering.enabled) ||
      (adv.vat && adv.vat.enabled)
    );
    const advHint = hasAdv ? ' (รวมตั้งค่าขั้นสูง)' : '';

    return (
      <div className="space-y-5">
        <div className="flex items-baseline justify-between flex-wrap gap-2">
          <h2 className="text-xl font-semibold text-ink-900">สรุปผลการคำนวณ</h2>
          <p className="text-xs text-ink-500">
            ระบบ {system.systemSizeKw.toFixed(1)} kW · ต้นทุน {formatTHB(totalCost)}
            {(() => {
              const batCost = (equipment && equipment.battery && equipment.battery.enabled) ? (Number(equipment.battery.costTHB) || 0) : 0;
              const vatOn   = !!(adv && adv.vat && adv.vat.enabled);
              const vatAmt  = vatOn ? Math.round((system.installationCostTHB + batCost) * (Number(adv.vat.rate) || 0) / 100) : 0;
              if (batCost === 0 && !vatOn) return null;
              const parts = ['แผง ' + formatTHB(system.installationCostTHB)];
              if (batCost > 0) parts.push('แบต ' + formatTHB(batCost));
              if (vatOn)       parts.push('VAT ' + formatTHB(vatAmt));
              return <span className="text-ink-400"> ({parts.join(' + ')})</span>;
            })()}
            {hasAdv && <span className="text-brand-600 font-medium"> · ⚙ ตั้งค่าขั้นสูง ON</span>}
          </p>
        </div>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-5 print-detail-grid">

          {/* ค่าไฟที่ประหยัด */}
          <SummarySection
            title="การประหยัดค่าไฟ"
            subtitle="เงินที่ประหยัดได้จากการติดโซลาร์"
            icon={<PiggyIcon cn="w-5 h-5" />}
            color="bg-green-50 text-green-600">
            <StatBox
              label="ค่าไฟต่อเดือน (ก่อนโซลาร์)"
              value={formatTHB(result.monthlyBillTHB)}
              hint={formatNumber(result.monthlyKwh, 0) + ' kWh/เดือน'}
              accent="text-ink-900" />
            <StatBox
              label="ค่าไฟต่อเดือน (หลังโซลาร์)"
              value={result.monthlyBillTHB - monthlySavings >= 0
                ? formatTHB(result.monthlyBillTHB - monthlySavings)
                : 'ได้รับคืน ' + formatTHB(monthlySavings - result.monthlyBillTHB)}
              hint={'ส่วนต่าง ' + formatTHB(monthlySavings) + '/เดือน'}
              accent={result.monthlyBillTHB - monthlySavings >= 0 ? 'text-blue-600' : 'text-green-600'} />
            <StatBox
              label={'ประหยัดต่อเดือน' + (nmRevenueYear > 0 ? ' + ขายไฟ' : '') + (hasBattery ? ' + แบต' : '')}
              value={formatTHB(monthlySavings)}
              hint={[
                hasBattery && 'รวมแบต ' + formatTHB(batSavingsYear/12) + '/เดือน',
                nmRevenueYear > 0 && 'รวมขายไฟ ' + formatTHB(nmRevenueYear/12) + '/เดือน',
              ].filter(Boolean).join(' · ') || undefined}
              accent="text-green-600" />
            <StatBox
              label={'ประหยัดต่อปี' + (nmRevenueYear > 0 ? ' + ขายไฟ' : '') + (hasBattery ? ' + แบต' : '')}
              value={formatTHB(effectiveAnnualSavings)}
              hint={hasBattery ? 'แบตเตอรี่ทดแทน ' + formatNumber(batOffsetKwhYear, 0) + ' kWh/ปี (' + formatTHB(batSavingsYear) + ')' : undefined}
              accent="text-green-600" />
            <StatBox
              label={'ประหยัดรวม 10 ปี' + advHint}
              value={formatTHB(totalSavings10Y)}
              accent="text-green-700" />
            <StatBox
              label={'ประหยัดรวม 25 ปี' + advHint}
              value={formatTHB(totalSavings25Y)}
              hint="ตามอายุการใช้งานแผงทั่วไป"
              accent="text-green-700" />
          </SummarySection>

          {/* ผลตอบแทนการลงทุน */}
          <SummarySection
            title="ผลตอบแทนการลงทุน (ROI)"
            subtitle="คุ้มทุนเมื่อไหร่ และได้กำไรเท่าไร"
            icon={<TrendIcon cn="w-5 h-5" />}
            color="bg-blue-50 text-blue-600">
            <StatBox
              label={'จุดคุ้มทุน' + advHint}
              value={formatYears(effectiveBreakEven)}
              accent="text-blue-600" />
            <StatBox
              label="ROI ต่อปี"
              value={isFinite(roiPercent) ? formatNumber(roiPercent, 1) + '%' : '-'}
              hint="ผลตอบแทนต่อต้นทุน"
              accent="text-blue-600" />
            <StatBox
              label={'กำไรสุทธิ 10 ปี' + advHint}
              value={formatTHB(netProfit10Y)}
              hint="หลังหักต้นทุนติดตั้งแล้ว"
              accent={netProfit10Y >= 0 ? 'text-blue-700' : 'text-red-600'} />
            <StatBox
              label={'กำไรสุทธิ 25 ปี' + advHint}
              value={formatTHB(netProfit25Y)}
              hint="หลังหักต้นทุนติดตั้งแล้ว"
              accent={netProfit25Y >= 0 ? 'text-blue-700' : 'text-red-600'} />
          </SummarySection>

          {/* ระบบและการผลิตไฟฟ้า */}
          <SummarySection
            title="ระบบและการผลิตไฟฟ้า"
            subtitle="ขนาดระบบและพลังงานที่ผลิตได้"
            icon={<ZapIcon cn="w-5 h-5" />}
            color="bg-amber-50 text-amber-600">
            <StatBox
              label="ขนาดระบบที่เลือก"
              value={system.systemSizeKw.toFixed(1) + ' kW'}
              accent="text-amber-700" />
            <StatBox
              label="ขนาดที่แนะนำ"
              value={result.recommendedSizeKw.toFixed(1) + ' kW'}
              hint="คลุม 80–100% ของกลางวัน"
              accent="text-amber-700" />
            <StatBox
              label="ผลิตไฟได้ต่อเดือน"
              value={formatNumber(result.monthlySolarKwh) + ' kWh'} />
            <StatBox
              label="ผลิตไฟได้ต่อปี"
              value={formatNumber(annualGenKwh) + ' kWh'} />
            <StatBox
              label="ทดแทนได้จริง/เดือน"
              value={formatNumber(result.monthlySolarOffsetKwh) + ' kWh'}
              hint="ส่วนที่ใช้ในบ้านได้"
              accent="text-amber-700" />
            <StatBox
              label="ครอบคลุมที่ทดแทนได้"
              value={formatNumber(Math.min(result.coveragePercent, 999), 0) + '%'}
              accent={
                result.coveragePercent >= 80 && result.coveragePercent <= 110
                  ? 'text-green-600'
                  : 'text-amber-600'
              } />
          </SummarySection>

          {/* ผลกระทบสิ่งแวดล้อม */}
          <SummarySection
            title="ผลกระทบสิ่งแวดล้อม"
            subtitle="ช่วยลดมลภาวะได้แค่ไหน"
            icon={<LeafIcon cn="w-5 h-5" />}
            color="bg-teal-50 text-teal-600">
            <StatBox
              label="ลด CO₂ ต่อปี"
              value={formatNumber(co2PerYear) + ' kg'}
              accent="text-teal-700" />
            <StatBox
              label="ลด CO₂ รวม 25 ปี"
              value={formatNumber(co2Total25Y / 1000, 1) + ' ตัน'}
              accent="text-teal-700" />
            <StatBox
              label="เทียบเท่าปลูกต้นไม้"
              value={formatNumber(treesEquivalent, 0) + ' ต้น/ปี'}
              hint="1 ต้นดูดซับ ~21 kg CO₂/ปี" />
            <StatBox
              label="ดึงจากการไฟฟ้า/ปี"
              value={formatNumber(annualGridKwh) + ' kWh'}
              hint="หน่วยที่ยังต้องซื้อ" />
          </SummarySection>

        </div>
      </div>
    );
  }

  // ==========================================================================
  // CHARTS
  // ==========================================================================
  function findCrossover(data) {
    for (const row of data) {
      if (row.year > 0 && row.cumulativeWithSolar <= row.cumulativeNoSolar) return row;
    }
    return null;
  }

  function ComparisonChart({ data }) {
    const crossover = findCrossover(data);
    return (
      <div className="w-full h-[320px]">
        <ResponsiveContainer width="100%" height="100%">
          <LineChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
            <XAxis dataKey="year" tick={{ fontSize: 12, fill: '#64748b' }}
              label={{ value: 'ปี', position: 'insideBottomRight', offset: -5, fill: '#64748b', fontSize: 12 }} />
            <YAxis tick={{ fontSize: 12, fill: '#64748b' }}
              tickFormatter={(v) => (v / 1000).toFixed(0) + 'k'} width={60} />
            <Tooltip formatter={(v) => formatTHB(v)}
              labelFormatter={(label) => 'ปีที่ ' + label}
              contentStyle={{ borderRadius: 12, border: '1px solid #e2e8f0', fontSize: 13 }} />
            <Legend wrapperStyle={{ fontSize: 12, paddingTop: 8 }} iconType="circle" />
            <Line type="monotone" dataKey="cumulativeNoSolar" name="ไม่ติดโซลาร์"
              stroke="#ef4444" strokeWidth={2.5} dot={{ r: 3 }} activeDot={{ r: 5 }} />
            <Line type="monotone" dataKey="cumulativeWithSolar" name="ติดโซลาร์ (รวมต้นทุน)"
              stroke="#f59e0b" strokeWidth={2.5} dot={{ r: 3 }} activeDot={{ r: 5 }} />
            {crossover && (
              <ReferenceDot x={crossover.year} y={crossover.cumulativeWithSolar}
                r={7} fill="#10b981" stroke="white" strokeWidth={2}
                label={{ value: 'จุดคุ้มทุน ปีที่ ' + crossover.year, position: 'top',
                         fill: '#10b981', fontSize: 11, fontWeight: 600 }} />
            )}
          </LineChart>
        </ResponsiveContainer>
      </div>
    );
  }

  function EnergyBreakdownChart({ data, hasBattery }) {
    return (
      <div className="w-full h-[320px]">
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
            <XAxis dataKey="monthLabel" tick={{ fontSize: 11, fill: '#64748b' }} />
            <YAxis tick={{ fontSize: 12, fill: '#64748b' }} width={50}
              label={{ value: 'kWh', angle: -90, position: 'insideLeft', fill: '#64748b', fontSize: 12 }} />
            <Tooltip formatter={(v) => formatNumber(v, 0) + ' kWh'}
              contentStyle={{ borderRadius: 12, border: '1px solid #e2e8f0', fontSize: 13 }} />
            <Legend wrapperStyle={{ fontSize: 12, paddingTop: 8 }} iconType="circle" />
            {/* Demand stack: solar offset + battery offset + grid */}
            <Bar dataKey="solarOffsetKwh"   name="ทดแทนด้วยโซลาร์" stackId="demand" fill="#f59e0b" />
            {hasBattery && (
              <Bar dataKey="batteryOffsetKwh" name="ทดแทนด้วยแบตเตอรี่" stackId="demand" fill="#10b981" />
            )}
            <Bar dataKey="gridUsageKwh"     name="ดึงจากการไฟฟ้า"  stackId="demand" fill="#94a3b8" radius={[6, 6, 0, 0]} />
            {/* Excess solar (overflow above demand) — separate visual */}
            <Bar dataKey="solarExcessKwh"   name="โซลาร์ส่วนเกิน (ทิ้ง)" stackId="excess" fill="#fde68a" radius={[6, 6, 0, 0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    );
  }

  // ==========================================================================
  // EQUIPMENT SECTION  ⭐ NEW — กรอกอุปกรณ์เพื่อปรับการคำนวณให้แม่นยำขึ้น
  // ==========================================================================
  function EquipmentSection({ value, onChange, system, onSystemChange, pr, onPrChange, autoSyncSize, onAutoSyncChange, adv }) {
    const [open, setOpen] = useState(true);
    const setPanels   = (p) => onChange({ ...value, panels:   { ...value.panels,   ...p } });
    const setInverter = (p) => onChange({ ...value, inverter: { ...value.inverter, ...p } });
    const setBattery  = (p) => onChange({ ...value, battery:  { ...value.battery,  ...p } });
    const setMount    = (p) => onChange({ ...value, mounting: { ...value.mounting, ...p } });

    const pKw    = panelTotalKw(value);
    const ratio  = dcAcRatio(value);
    const effKw  = effectiveSystemKw(value);
    const adjPR  = adjustedPR(value);

    let warning = null;
    if (ratio > 1.3)      warning = 'อินเวอร์เตอร์เล็กเกินไป — กำลังจะถูกตัด (clipping) ในช่วงพีค';
    else if (ratio < 0.95) warning = 'แผงน้อยเกินไป — อินเวอร์เตอร์ใหญ่เกินจำเป็น';

    return (
      <div className="bg-white rounded-2xl shadow-card p-6 space-y-5">
        <button onClick={() => setOpen(!open)}
          className="w-full flex items-center justify-between gap-2 text-left">
          <div>
            <h2 className="text-lg font-semibold text-ink-900 flex items-center gap-2">
              <BoxIcon cn="w-5 h-5 text-brand-500" />
              อุปกรณ์ติดตั้ง (ทางเลือก)
            </h2>
            <p className="text-sm text-ink-500">
              {value.panels.count} แผง × {value.panels.watts}W = {pKw.toFixed(2)} kW · อินเวอร์เตอร์ {value.inverter.capacityKw} kW
              {value.battery.enabled && ` · แบตฯ ${value.battery.capacityKwh} kWh`}
            </p>
          </div>
          <ChevronIcon cn={clsx('w-5 h-5 text-ink-500 transition-transform', open && 'rotate-180')} />
        </button>

        {open && <>

        {/* Panels */}
        <div>
          <h3 className="text-sm font-semibold text-ink-700 mb-2 flex items-center gap-2">
            <GridIcon cn="w-4 h-4 text-brand-500" />
            แผงโซลาร์เซลล์
          </h3>
          <div className="grid grid-cols-3 gap-3">
            <label className="block">
              <span className="text-[11px] text-ink-500">วัตต์/แผง</span>
              <input type="number" min={100} max={800} step={5}
                value={value.panels.watts}
                onChange={(e) => setPanels({ watts: nv(e.target.value) })}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
            </label>
            <label className="block">
              <span className="text-[11px] text-ink-500">จำนวนแผง</span>
              <input type="number" min={1} max={200} step={1}
                value={value.panels.count}
                onChange={(e) => setPanels({ count: nv(e.target.value) })}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
            </label>
            <div>
              <span className="text-[11px] text-ink-500">รวมกำลังติดตั้ง</span>
              <p className="mt-1 px-3 py-2 rounded-lg bg-brand-50 text-brand-700 text-sm font-semibold">
                {pKw.toFixed(2)} kW
              </p>
            </div>
          </div>
          <input type="text" placeholder="ยี่ห้อ/รุ่น (เช่น Jinko Tiger Neo 580W)"
            value={value.panels.brand}
            onChange={(e) => setPanels({ brand: e.target.value })}
            className="w-full mt-2 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
        </div>

        {/* Inverter */}
        <div>
          <h3 className="text-sm font-semibold text-ink-700 mb-2 flex items-center gap-2">
            <ZapIcon cn="w-4 h-4 text-brand-500" />
            อินเวอร์เตอร์
          </h3>
          <div className="grid grid-cols-3 gap-3">
            <label className="block">
              <span className="text-[11px] text-ink-500">ขนาด (kW)</span>
              <input type="number" min={0.5} max={50} step={0.5}
                value={value.inverter.capacityKw}
                onChange={(e) => setInverter({ capacityKw: nv(e.target.value) })}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
            </label>
            <label className="block">
              <span className="text-[11px] text-ink-500">ประสิทธิภาพ (%)</span>
              <input type="number" min={80} max={99} step={0.1}
                value={value.inverter.efficiency}
                onChange={(e) => setInverter({ efficiency: nv(e.target.value) })}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
            </label>
            <label className="block">
              <span className="text-[11px] text-ink-500">ประเภท</span>
              <select value={value.inverter.type}
                onChange={(e) => setInverter({ type: e.target.value })}
                className="w-full mt-1 px-2 py-2 rounded-lg border border-ink-300 text-sm bg-white">
                <option value="string">String</option>
                <option value="micro">Micro</option>
                <option value="hybrid">Hybrid</option>
              </select>
            </label>
          </div>
          <input type="text" placeholder="ยี่ห้อ/รุ่น (เช่น Huawei SUN2000-5KTL)"
            value={value.inverter.brand}
            onChange={(e) => setInverter({ brand: e.target.value })}
            className="w-full mt-2 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
          <div className="grid grid-cols-2 gap-3 mt-3">
            <div className="bg-ink-100/60 rounded-lg p-2 text-center">
              <p className="text-[10px] text-ink-500 uppercase">DC/AC Ratio</p>
              <p className={clsx(
                'text-sm font-semibold mt-0.5',
                ratio >= 1.0 && ratio <= 1.25 ? 'text-green-600' : 'text-amber-600'
              )}>{ratio.toFixed(2)}</p>
            </div>
            <div className="bg-ink-100/60 rounded-lg p-2 text-center">
              <p className="text-[10px] text-ink-500 uppercase">ใช้งานจริงสูงสุด</p>
              <p className="text-sm font-semibold mt-0.5">{effKw.toFixed(2)} kW</p>
            </div>
          </div>
          {warning && (
            <p className="text-[11px] text-amber-700 mt-2 bg-amber-50 border border-amber-200 px-2 py-1.5 rounded-lg">
              ⚠ {warning}
            </p>
          )}
        </div>

        {/* Battery */}
        <div>
          <label className="flex items-center gap-2 text-sm font-semibold text-ink-700 mb-3 cursor-pointer">
            <input type="checkbox"
              checked={value.battery.enabled}
              onChange={(e) => setBattery({ enabled: e.target.checked })}
              className="w-4 h-4 rounded text-brand-500 accent-brand-500" />
            <BatteryIcon cn="w-4 h-4 text-brand-500" />
            มีแบตเตอรี่กักเก็บพลังงาน
          </label>
          {value.battery.enabled && (
            <>
              <div className="grid grid-cols-2 gap-3 pl-6">
                <label className="block">
                  <span className="text-[11px] text-ink-500">ความจุ (kWh)</span>
                  <input type="number" min={1} max={100} step={0.5}
                    value={value.battery.capacityKwh}
                    onChange={(e) => setBattery({ capacityKwh: nv(e.target.value) })}
                    className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
                </label>
                <label className="block">
                  <span className="text-[11px] text-ink-500">Round-trip Efficiency (%)</span>
                  <input type="number" min={70} max={98} step={1}
                    value={value.battery.efficiency}
                    onChange={(e) => setBattery({ efficiency: nv(e.target.value) })}
                    className="w-full mt-1 px-3 py-2 rounded-lg border border-ink-300 text-sm" />
                </label>
                <label className="block col-span-2">
                  <span className="text-[11px] text-ink-500 flex items-center justify-between">
                    <span>ราคาแบตเตอรี่ (บาท) — รวมในต้นทุนคำนวณคืนทุน</span>
                    <button type="button"

  function ExportButtons({ getExportData }) {
    const handlePrint = () => window.print();

    const handleJSONDownload = () => {
      const data = getExportData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const date = new Date().toISOString().slice(0, 10);
      a.download = `solar-roi-${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    const handleReset = () => {
      if (confirm('ล้างข้อมูลที่กรอกไว้ทั้งหมดและเริ่มใหม่?')) {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        location.reload();
      }
    };

    return (
      <div className="flex gap-2 no-print flex-wrap justify-end">
        <button onClick={handlePrint}
          title="พิมพ์หรือบันทึกเป็น PDF"
          className="inline-flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-2 rounded-xl bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-xs sm:text-sm font-medium transition border border-white/30">
          <PrinterIcon cn="w-4 h-4" /> <span className="hidden sm:inline">พิมพ์ / PDF</span>
        </button>
        <button onClick={handleJSONDownload}
          title="ดาวน์โหลดข้อมูลทั้งหมดเป็น JSON"
          className="inline-flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-2 rounded-xl bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-xs sm:text-sm font-medium transition border border-white/30">
          <DownloadIcon cn="w-4 h-4" /> <span className="hidden sm:inline">JSON</span>
        </button>
        <button onClick={handleReset}
          title="ล้างข้อมูลและเริ่มใหม่"
          className="inline-flex items-center gap-1.5 sm:gap-2 px-2.5 sm:px-3 py-2 rounded-xl bg-white/10 hover:bg-white/20 backdrop-blur-sm text-white/90 text-xs sm:text-sm font-medium transition border border-white/20">
          <TrashIcon cn="w-4 h-4" /> <span className="hidden sm:inline">เริ่มใหม่</span>
        </button>
      </div>
    );
  }

  // ==========================================================================
  // LOCAL STORAGE — saves the user's state across page reloads
  // ==========================================================================
  const STORAGE_KEY = 'solar-roi-state-v1';
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }
  function persistedState(key, fallback) {
    const saved = loadState();
    return (saved && saved[key] !== undefined) ? saved[key] : fallback;
  }

  // DASHBOARD
  // ==========================================================================
  function Dashboard() {
    const [mode, setMode] = useState(() => persistedState('mode', 'estimated'));
    const [estimated, setEstimated] = useState(() => persistedState('estimated', {
      mode: 'estimated', monthlyBillTHB: 4500, daytimeUsagePercent: 50,
    }));
    const [detailed, setDetailed] = useState(() => persistedState('detailed', {
      mode: 'detailed', appliances: [], baselineKwhMonth: 0, baselineDaytimePercent: 35,
    }));
    const [system, setSystem]       = useState(() => persistedState('system',    { systemSizeKw: 5, installationCostTHB: 180000 }));
    const [tariff, setTariff]       = useState(() => persistedState('tariff',    DEFAULT_TARIFF));
    const [region, setRegion]       = useState(() => persistedState('region',    DEFAULT_REGION));
    const [pr,     setPr]           = useState(() => persistedState('pr',        DEFAULT_PR));
    const [equipment, setEquipment] = useState(() => persistedState('equipment', DEFAULT_EQUIPMENT));
    const [autoSyncSize, setAutoSyncSize] = useState(() => persistedState('autoSyncSize', true));
    const [adv, setAdv] = useState(() => persistedState('adv', DEFAULT_ADVANCED));

    // Dark mode (guard against legacy localStorage where adv might lack darkMode)
    useEffect(() => {
      document.documentElement.classList.toggle('dark', !!(adv && adv.darkMode));
    }, [adv && adv.darkMode]);

    // Persist state to localStorage on every change
    useEffect(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          mode, estimated, detailed, system, tariff, region, pr, equipment, autoSyncSize, adv,
        }));
      } catch { /* localStorage may be unavailable in private mode */ }
    }, [mode, estimated, detailed, system, tariff, region, pr, equipment, adv]);

    // Auto-sync ONLY system size from equipment specs.
    // PR remains manually controlled by the LocationSettings slider —
    // the equipment section shows "PR ที่แนะนำ" as a hint instead.
    useEffect(() => {
      if (!autoSyncSize) return;
      const effKw = effectiveSystemKw(equipment);

        ...prev,
        systemSizeKw: Math.max(1, Math.round(effKw * 2) / 2),
      }));
    }, [equipment, autoSyncSize]);

    const userInput  = mode === 'estimated' ? estimated : detailed;
    const result     = useMemo(() => calculate(userInput, system, tariff, region, pr, equipment, adv),
                               [userInput, system, tariff, region, pr, equipment, adv]);
    // Use total cost (solar + battery) so the projection chart starts from the true investment.
    const projection = useMemo(() => buildYearlyProjection(result, result.totalInstallCostTHB != null ? result.totalInstallCostTHB : system.installationCostTHB, adv, 20),
                               [result, system.installationCostTHB, adv]);
    const monthly    = useMemo(() => buildMonthlyBreakdown(result, system, region, pr, equipment),

    // Footer summary

    const locNote = `${REGIONS[region].name} · แดดเฉลี่ย ${avgPsh(region).toFixed(2)} ชม./วัน · PR ${Math.round(pr * 100)}%`;

    // Build export payload
    const getExportData = () => ({
      meta: {
        title: 'รายงานการคำนวณ ROI โซลาร์เซลล์',
        timestamp: new Date().toISOString(),
        date_th: new Date().toLocaleDateString('th-TH'),
      },
      input: { mode, ...(mode === 'estimated' ? estimated : detailed) },
      tariff,
      location: { region, regionName: REGIONS[region].name, avgPSH: avgPsh(region), pr },
      system,
      equipment,
      result,
      projection_10y: projection,
      monthly_breakdown: monthly,
    });

    return (
      <main className="min-h-screen w-full">
        <header className="bg-gradient-to-r from-brand-600 to-brand-400 text-white">
          <div className="max-w-7xl mx-auto px-6 py-8 flex items-center gap-4 flex-wrap">
            <div className="bg-white/20 backdrop-blur-sm rounded-2xl p-3"><SunIcon cn="w-8 h-8" /></div>
            <div className="flex-1 min-w-[260px]">
              <h1 className="text-2xl md:text-3xl font-bold">คำนวณคืนทุนโซลาร์เซลล์</h1>
              <p className="text-white/90 text-sm md:text-base">
                ประเมินขนาดระบบที่เหมาะสมและจุดคุ้มทุนสำหรับบ้านของคุณ
              </p>
            </div>
            <ExportButtons getExportData={getExportData} />
          </div>
          <div className="print-only max-w-7xl mx-auto px-6 pb-4 text-white text-xs">
            พิมพ์เมื่อ {new Date().toLocaleString('th-TH')} · {locNote}
          </div>
        </header>

        <div className="max-w-7xl mx-auto px-6 py-8 space-y-8">
          {/* Print-only input snapshot — comprehensive settings used */}
          <div className="print-only print-input-snapshot" style={{padding:'2mm 5mm',fontSize:'6.5pt',lineHeight:'1.3'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'2mm',marginBottom:'1mm'}}>

                <strong style={{fontSize:'7pt'}}>🔧 อุปกรณ์ที่ติดตั้ง</strong><br/>
                แผงโซลาร์: {equipment.panels.watts}W × {equipment.panels.count} แผง = {(equipment.panels.watts * equipment.panels.count / 1000).toFixed(2)} kWp<br/>
                อินเวอร์เตอร์: {equipment.inverter.capacityKw} kW ({equipment.inverter.efficiency}% eff)<br/>
                DC/AC Ratio: {dcAcRatio(equipment).toFixed(2)}<br/>
                {equipment.battery.enabled
                  ? <>แบตเตอรี่: {equipment.battery.capacityKwh} kWh ({equipment.battery.efficiency}% eff) · {formatTHB(equipment.battery.costTHB || 0)}</>

            <div className={clsx(
              "space-y-6 order-3",
              mode === 'estimated' ? "lg:col-span-1 lg:row-span-2" : "lg:col-span-1"
            )}>
              <LocationSettings region={region} onRegionChange={setRegion} pr={pr} onPrChange={setPr} />
              <TariffSettings value={tariff} onChange={setTariff} />
              <AdvancedSettings value={adv} onChange={setAdv} />
            </div>
          </div>

          <SummaryCards result={result} system={system} tariff={tariff} adv={adv} />

          <DetailedSummary result={result} system={system} tariff={tariff} adv={adv} equipment={equipment} />

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print-charts-row">
            <div className="bg-white rounded-2xl shadow-card p-6">
              <h3 className="text-lg font-semibold text-ink-900 mb-1">เปรียบเทียบค่าไฟสะสม 20 ปี</h3>
              <p className="text-sm text-ink-500 mb-4">ติดโซลาร์ vs. ไม่ติดโซลาร์ (รวมค่าติดตั้งเริ่มต้น)</p>
              <ComparisonChart data={projection} />
            </div>
            <div className="bg-white rounded-2xl shadow-card p-6">
              <h3 className="text-lg font-semibold text-ink-900 mb-1">การใช้พลังงานรายเดือน</h3>
              <p className="text-sm text-ink-500 mb-4">พลังงานที่ใช้ทั้งหมด เทียบกับ ที่โซลาร์ผลิตทดแทน (kWh)</p>
              <EnergyBreakdownChart data={monthly} hasBattery={equipment.battery && equipment.battery.enabled} />
            </div>
          </div>

          {/* Monthly Bill Before/After Chart — screen only */}
          <div className="bg-white rounded-2xl shadow-card p-6 no-print">
            <h3 className="text-lg font-semibold text-ink-900 mb-1 flex items-center gap-2">
              <BanknoteIcon cn="w-5 h-5 text-brand-500" /> ค่าไฟรายเดือน ก่อน vs. หลังติดโซลาร์
            </h3>
            <p className="text-sm text-ink-500 mb-4">เปรียบเทียบค่าไฟ (บาท) แต่ละเดือน</p>
            <div className="h-[300px]">
              <Recharts.ResponsiveContainer width="100%" height="100%">
                <Recharts.BarChart data={monthly.map((m, i) => {
                  const onPkRate = tariff.mode === 'flat' ? tariff.flatRate : tariff.onPeakRate;
                  const offPkRate = tariff.mode === 'flat' ? tariff.flatRate : tariff.offPeakRate;
                  const avgRate = (onPkRate + offPkRate) / 2;
                  const billBefore = m.totalUsageKwh * avgRate;
                  const billAfter = m.gridUsageKwh * avgRate;
                  return { ...m, billBefore: Math.round(billBefore), billAfter: Math.round(billAfter) };
                })} margin={{ top: 25, right: 20, bottom: 5, left: 10 }}>
                  <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <Recharts.XAxis dataKey="monthLabel" tick={{ fontSize: 12 }} />
                  <Recharts.YAxis tickFormatter={(v) => (v/1000).toFixed(1) + 'k'} tick={{ fontSize: 11 }} />
                  <Recharts.Tooltip formatter={(v) => formatTHB(v)} />
                  <Recharts.Legend />
                  <Recharts.Bar dataKey="billBefore" name="ก่อนโซลาร์" fill="#f87171" radius={[4,4,0,0]}>
                    <Recharts.LabelList dataKey="billBefore" position="top"
                      formatter={(v) => v >= 1000 ? (v/1000).toFixed(1) + 'k' : Math.round(v)}
                      style={{ fontSize: 9, fill: '#991b1b', fontWeight: 500 }} />
                  </Recharts.Bar>
                  <Recharts.Bar dataKey="billAfter" name="หลังโซลาร์" fill="#34d399" radius={[4,4,0,0]}>
                    <Recharts.LabelList dataKey="billAfter" position="top"
                      formatter={(v) => v >= 1000 ? (v/1000).toFixed(1) + 'k' : Math.round(v)}
                      style={{ fontSize: 9, fill: '#065f46', fontWeight: 500 }} />
                  </Recharts.Bar>
                </Recharts.BarChart>
              </Recharts.ResponsiveContainer>
            </div>
          </div>

          {/* Battery Summary — shown only when battery is enabled */}
          <BatterySummary result={result} equipment={equipment} tariff={tariff} />

          {/* Excess Solar Months Detail */}
          <ExcessSolarDetail data={monthly} adv={adv} />

          {/* System Comparison (full table — screen only) */}
          <SystemComparison
            baseResult={result} baseSystem={system}
            tariff={tariff} region={region} pr={pr}
            equipment={equipment} userInput={userInput} adv={adv} />

          {/* Recommended Size Summary — focused on the starred option (visible everywhere) */}
          <RecommendedSizeSummary
            baseResult={result} baseSystem={system}
            tariff={tariff} region={region} pr={pr}
            equipment={equipment} userInput={userInput} adv={adv} />

          {/* Print-only extra summary cards replacing hidden charts */}
          <PrintExtraSummary
            monthly={monthly} result={result} system={system}
            tariff={tariff} adv={adv} projection={projection} />

          <div className="flex justify-center gap-3 no-print">
            <ShareButton getExportData={getExportData} />
          </div>

          <footer className="text-center text-xs text-ink-500 pb-6">
            ตัวเลขเป็นการประมาณการเบื้องต้น — {rateNote}
            <br />{locNote}
            <br />ขอใบเสนอราคาจริงจากผู้ติดตั้งที่ได้รับการรับรอง
          </footer>
        </div>
      </main>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
